<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>osu! · Beatmap Builder + Export/Import .osubm</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: none;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 820px;
        }

        .game-container {
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            background: #11161f;
            width: 100%;
            height: auto;
            touch-action: none;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 8px 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            align-items: center;
        }

        .controls button {
            background: #292f42;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            color: #eff3ff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .controls button.primary {
            background: #ff66aa;
            color: white;
        }

        .controls button.danger {
            background: #ff3366;
            color: white;
        }

        .controls button.success {
            background: #66cc88;
            color: white;
        }

        .controls button.warning {
            background: #ffaa44;
            color: #1a1a2e;
        }

        .controls input, .controls select {
            background: #1e2438;
            border: 1px solid #4a4a6a;
            border-radius: 40px;
            padding: 3px 10px;
            color: #f0e6ff;
            font-family: inherit;
            font-size: 0.7rem;
            outline: none;
            min-width: 60px;
        }

        .controls input:focus, .controls select:focus {
            border-color: #ff66aa;
        }

        .controls label {
            color: #aab3cf;
            font-size: 0.65rem;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 4px 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            flex-wrap: wrap;
        }

        .status-bar span {
            color: #aab3cf;
            font-size: 0.65rem;
            font-family: monospace;
        }

        .lives-display {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff6699;
            pointer-events: none;
            font-family: monospace;
        }

        .accuracy-warning {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            color: #ffaa44;
            pointer-events: none;
            font-family: monospace;
        }

        .difficulty-indicator {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 4px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff88cc;
            color: #ff88cc;
            pointer-events: none;
            font-family: monospace;
        }

        .floating-judgement {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 200;
            animation: floatUp 0.7s ease-out forwards;
            white-space: nowrap;
            font-family: monospace;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.9); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.1); }
        }

        .death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .death-container {
            text-align: center;
            background: #1a0a1a;
            padding: 40px;
            border-radius: 48px;
            border: 2px solid #ff3366;
        }

        .death-title {
            font-size: 3rem;
            font-weight: 900;
            color: #ff3366;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .death-subtitle {
            font-size: 1rem;
            color: #ff8888;
            margin-bottom: 30px;
        }

        .death-reload {
            background: #ff3366;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .beatmap-list {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2e;
            border-radius: 32px;
            padding: 30px;
            max-width: 420px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 1000;
            border: 2px solid #ff88cc;
            box-shadow: 0 0 40px rgba(255, 136, 204, 0.3);
            display: none;
        }

        .beatmap-list.active {
            display: block;
        }

        .beatmap-list h3 {
            color: #ffd966;
            margin-bottom: 15px;
            text-align: center;
        }

        .beatmap-item {
            background: #2a2342;
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid #4a4a6a;
        }

        .beatmap-item:hover {
            border-color: #ff66aa;
        }

        .beatmap-item .name {
            color: #f0e6ff;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .beatmap-item .info {
            color: #aab3cf;
            font-size: 0.65rem;
        }

        .beatmap-item .btn-group {
            display: flex;
            gap: 4px;
        }

        .beatmap-item button {
            border: none;
            color: white;
            border-radius: 40px;
            padding: 2px 10px;
            cursor: pointer;
            font-size: 0.65rem;
        }

        .beatmap-item .load-btn { background: #66cc88; }
        .beatmap-item .export-btn { background: #ffaa44; color: #1a1a2e; }
        .beatmap-item .delete-btn { background: #ff3366; }

        .close-list {
            background: #ff3366;
            border: none;
            color: white;
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }

        .file-input-hidden {
            display: none;
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .floating-judgement { font-size: 1.2rem; }
            .death-title { font-size: 2rem; }
            .controls { gap: 4px; }
            .controls button { font-size: 0.6rem; padding: 3px 8px; }
            .controls input { font-size: 0.6rem; padding: 2px 6px; min-width: 50px; }
            .beatmap-list { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="lives-display" id="livesDisplay">LIVES: 2</div>
<div class="accuracy-warning" id="accuracyWarning">ACC: 100%</div>
<div class="difficulty-indicator" id="difficultyIndicator">NORMAL</div>

<div class="main-container">
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        
        <div class="controls">
            <button class="primary" id="playBtn">PLAY</button>
            <button id="buildBtn">BUILD</button>
            <button class="success" id="saveBtn">SAVE</button>
            <button id="loadBtn">LOAD</button>
            <button id="exportBtn" class="warning">EXPORT</button>
            <button id="importBtn" class="warning">IMPORT</button>
            <button class="danger" id="clearBtn">CLEAR</button>
            
            <label>BPM</label>
            <input type="number" id="bpmInput" value="120" min="60" max="300" style="width:45px">
            
            <label>NAME</label>
            <input type="text" id="beatmapNameInput" value="My Beatmap" style="width:80px">
            
            <label>MUSIC</label>
            <input type="file" id="musicFileInput" accept="audio/*" style="width:100px;padding:2px 6px;font-size:0.6rem;">
        </div>
        
        <div class="status-bar">
            <span id="noteCount">NOTES: 0</span>
            <span id="beatmapStatus">STATUS: IDLE</span>
            <span id="musicStatus">NO MUSIC</span>
        </div>
    </div>
</div>

<!-- Hidden file input for import -->
<input type="file" id="importFileInput" class="file-input-hidden" accept=".osubm">

<!-- Beatmap List Modal -->
<div class="beatmap-list" id="beatmapList">
    <h3>SAVED BEATMAPS</h3>
    <div id="beatmapListContent"></div>
    <button class="close-list" id="closeListBtn">CLOSE</button>
</div>

<script>
    // ============================================
    // BEATMAP BUILDER + PLAYER + EXPORT/IMPORT
    // ============================================
    
    const DEFAULT_QUESTIONS = [
        { "question": "How many rooms does Tin Shing Court have?", "options": ["1", "2", "3", "4"], "correct": 2 },
        { "question": "When was Tin Shing Court finished building?", "options": ["1986", "1987", "1999", "2000"], "correct": 2 },
        { "question": "How many times have the Tin Shing Mall been rebuilt?", "options": ["1", "2", "3", "4"], "correct": 0 }
    ];

    const difficulties = [
        { name: "EASY",   timingWindow: 1.3, radius: 38 },
        { name: "NORMAL", timingWindow: 1.0, radius: 34 },
        { name: "HARD",   timingWindow: 0.8, radius: 30 },
        { name: "INSANE", timingWindow: 0.65, radius: 27 }
    ];
    
    const TIMING = { perfect: 45, good: 90, ok: 160 };
    const BASE_SCORE = 250;
    const DOUBLE_SCORE = 400;
    const GAME_DURATION = 30000;
    
    let canvas, ctx;
    let activeCircles = [];
    let activeDoubles = [];
    let score = 0, combo = 0, maxCombo = 0, totalHits = 0, misses = 0;
    let gameActive = false, gameStarted = false;
    let currentDifficulty = 1;
    let gameStartTime = 0;
    let animationId = null;
    let allNotes = [];
    let nextNoteIndex = 0;
    
    // Beatmap builder
    let isBuilding = false;
    let buildingNotes = [];
    let buildingDoubles = [];
    let bpm = 120;
    let beatmapName = 'My Beatmap';
    let audioContext = null;
    let audioBuffer = null;
    let audioSource = null;
    let musicFile = null;
    let musicName = 'No Music';
    
    let quizActive = true, gameLocked = true;
    let questionBank = [];
    let deathTriggered = false;
    
    const canvasElem = document.getElementById('gameCanvas');
    canvasElem.width = 800;
    canvasElem.height = 500;
    ctx = canvasElem.getContext('2d');
    
    // ============================================
    // AUDIO
    // ============================================
    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioContext;
    }
    
    function loadMusicFile(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const ctx = initAudio();
                const arrayBuffer = e.target.result;
                audioBuffer = await ctx.decodeAudioData(arrayBuffer);
                musicFile = file;
                musicName = file.name;
                document.getElementById('musicStatus').innerHTML = musicName;
                document.getElementById('beatmapStatus').innerHTML = 'MUSIC LOADED';
            } catch (err) {
                console.error('Error loading music:', err);
                document.getElementById('musicStatus').innerHTML = 'ERROR';
            }
        };
        reader.readAsArrayBuffer(file);
    }
    
    function playMusic() {
        if (!audioBuffer) return;
        try {
            const ctx = initAudio();
            if (audioSource) {
                audioSource.stop();
                audioSource.disconnect();
            }
            audioSource = ctx.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(ctx.destination);
            audioSource.start(0);
            document.getElementById('musicStatus').innerHTML = 'PLAYING: ' + musicName;
        } catch (err) {
            console.error('Error playing music:', err);
        }
    }
    
    function stopMusic() {
        if (audioSource) {
            try {
                audioSource.stop();
                audioSource.disconnect();
            } catch(e) {}
            audioSource = null;
        }
    }
    
    // ============================================
    // BEATMAP STORAGE (localStorage)
    // ============================================
    function getBeatmapData() {
        return {
            name: document.getElementById('beatmapNameInput').value || 'My Beatmap',
            bpm: parseInt(document.getElementById('bpmInput').value) || 120,
            circles: buildingNotes.map(n => ({ x: n.x, y: n.y, time: n.time })),
            doubles: buildingDoubles.map(d => ({ 
                x1: d.x1, y1: d.y1, x2: d.x2, y2: d.y2, time: d.time 
            })),
            musicName: musicName || 'No Music',
            version: '1.0'
        };
    }
    
    function saveBeatmap() {
        const data = getBeatmapData();
        const name = data.name;
        
        let beatmaps = JSON.parse(localStorage.getItem('osuBeatmaps') || '[]');
        const existingIndex = beatmaps.findIndex(b => b.name === name);
        if (existingIndex >= 0) {
            beatmaps[existingIndex] = data;
        } else {
            beatmaps.push(data);
        }
        localStorage.setItem('osuBeatmaps', JSON.stringify(beatmaps));
        document.getElementById('beatmapStatus').innerHTML = 'SAVED: ' + name;
        updateNoteCount();
    }
    
    function loadBeatmapList() {
        const beatmaps = JSON.parse(localStorage.getItem('osuBeatmaps') || '[]');
        const container = document.getElementById('beatmapListContent');
        
        if (beatmaps.length === 0) {
            container.innerHTML = '<p style="color:#aab3cf;text-align:center;">No saved beatmaps</p>';
        } else {
            container.innerHTML = beatmaps.map((b, idx) => `
                <div class="beatmap-item">
                    <div>
                        <div class="name">${b.name}</div>
                        <div class="info">BPM: ${b.bpm} | Notes: ${(b.circles || []).length + (b.doubles || []).length} | ${b.musicName || 'No Music'}</div>
                    </div>
                    <div class="btn-group">
                        <button class="load-btn" data-idx="${idx}">LOAD</button>
                        <button class="export-btn" data-idx="${idx}">EXPORT</button>
                        <button class="delete-btn" data-idx="${idx}">X</button>
                    </div>
                </div>
            `).join('');
            
            container.querySelectorAll('.load-btn').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    loadBeatmapByIndex(idx);
                    document.getElementById('beatmapList').classList.remove('active');
                };
            });
            
            container.querySelectorAll('.export-btn').forEach(btn => {
                btn.onclick = () => {
                    const idx = parseInt(btn.dataset.idx);
                    exportBeatmapByIndex(idx);
                };
            });
            
            container.querySelectorAll('.delete-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    let beatmaps = JSON.parse(localStorage.getItem('osuBeatmaps') || '[]');
                    beatmaps.splice(idx, 1);
                    localStorage.setItem('osuBeatmaps', JSON.stringify(beatmaps));
                    loadBeatmapList();
                };
            });
        }
        
        document.getElementById('beatmapList').classList.add('active');
    }
    
    function loadBeatmapByIndex(idx) {
        const beatmaps = JSON.parse(localStorage.getItem('osuBeatmaps') || '[]');
        if (idx < 0 || idx >= beatmaps.length) return;
        
        const b = beatmaps[idx];
        document.getElementById('beatmapNameInput').value = b.name;
        document.getElementById('bpmInput').value = b.bpm;
        
        buildingNotes = (b.circles || []).map(c => ({
            x: c.x, y: c.y, time: c.time, type: 'circle'
        }));
        
        buildingDoubles = (b.doubles || []).map(d => ({
            x1: d.x1, y1: d.y1, x2: d.x2, y2: d.y2, time: d.time, type: 'double'
        }));
        
        musicName = b.musicName || 'No Music';
        document.getElementById('musicStatus').innerHTML = musicName;
        document.getElementById('beatmapStatus').innerHTML = 'LOADED: ' + b.name;
        updateNoteCount();
        drawBuilder();
    }
    
    function clearBeatmap() {
        if (isBuilding) {
            buildingNotes = [];
            buildingDoubles = [];
            updateNoteCount();
            document.getElementById('beatmapStatus').innerHTML = 'CLEARED';
            drawBuilder();
        }
    }
    
    function updateNoteCount() {
        const count = buildingNotes.length + buildingDoubles.length;
        document.getElementById('noteCount').innerHTML = 'NOTES: ' + count;
    }
    
    // ============================================
    // EXPORT / IMPORT .osubm
    // ============================================
    function exportBeatmap() {
        const data = getBeatmapData();
        if (data.circles.length === 0 && data.doubles.length === 0) {
            document.getElementById('beatmapStatus').innerHTML = 'ERROR: No notes to export';
            return;
        }
        
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = data.name.replace(/[^a-zA-Z0-9]/g, '_') + '.osubm';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        document.getElementById('beatmapStatus').innerHTML = 'EXPORTED: ' + data.name;
    }
    
    function exportBeatmapByIndex(idx) {
        const beatmaps = JSON.parse(localStorage.getItem('osuBeatmaps') || '[]');
        if (idx < 0 || idx >= beatmaps.length) return;
        
        const data = beatmaps[idx];
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = data.name.replace(/[^a-zA-Z0-9]/g, '_') + '.osubm';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    function importBeatmap(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                
                // Validate
                if (!data.name || !data.bpm || (!data.circles && !data.doubles)) {
                    document.getElementById('beatmapStatus').innerHTML = 'ERROR: Invalid .osubm file';
                    return;
                }
                
                document.getElementById('beatmapNameInput').value = data.name;
                document.getElementById('bpmInput').value = data.bpm;
                
                buildingNotes = (data.circles || []).map(c => ({
                    x: c.x, y: c.y, time: c.time, type: 'circle'
                }));
                
                buildingDoubles = (data.doubles || []).map(d => ({
                    x1: d.x1, y1: d.y1, x2: d.x2, y2: d.y2, time: d.time, type: 'double'
                }));
                
                musicName = data.musicName || 'No Music';
                document.getElementById('musicStatus').innerHTML = musicName;
                document.getElementById('beatmapStatus').innerHTML = 'IMPORTED: ' + data.name;
                updateNoteCount();
                drawBuilder();
                
                // Auto-save imported beatmap
                saveBeatmap();
                document.getElementById('beatmapStatus').innerHTML = 'IMPORTED & SAVED: ' + data.name;
                
            } catch (err) {
                console.error('Import error:', err);
                document.getElementById('beatmapStatus').innerHTML = 'ERROR: Failed to import';
            }
        };
        reader.readAsText(file);
    }
    
    // ============================================
    // BUILDER MODE
    // ============================================
    function toggleBuilder() {
        isBuilding = !isBuilding;
        if (isBuilding) {
            document.getElementById('beatmapStatus').innerHTML = 'BUILD MODE - TAP TO PLACE';
            document.getElementById('buildBtn').style.background = '#ff66aa';
            gameActive = false;
            gameStarted = false;
            if (animationId) cancelAnimationFrame(animationId);
            drawBuilder();
            stopMusic();
        } else {
            document.getElementById('beatmapStatus').innerHTML = 'IDLE';
            document.getElementById('buildBtn').style.background = '';
            if (buildingNotes.length > 0 || buildingDoubles.length > 0) {
                document.getElementById('playBtn').style.background = '#66cc88';
            }
        }
    }
    
    function drawBuilder() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        ctx.fillStyle = '#11161f';
        ctx.fillRect(0, 0, canvasElem.width, canvasElem.height);
        
        // Grid
        ctx.strokeStyle = '#1a1a2e';
        ctx.lineWidth = 1;
        for (let x = 0; x < canvasElem.width; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvasElem.height);
            ctx.stroke();
        }
        for (let y = 0; y < canvasElem.height; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvasElem.width, y);
            ctx.stroke();
        }
        
        // Beat lines
        const bpmVal = parseInt(document.getElementById('bpmInput').value) || 120;
        const beatInterval = 60000 / bpmVal;
        for (let t = 0; t < 30000; t += beatInterval) {
            const x = (t / 30000) * (canvasElem.width - 40) + 20;
            ctx.fillStyle = '#2a2a4a';
            ctx.fillRect(x - 1, canvasElem.height - 30, 2, 20);
        }
        
        // Draw building notes
        for (const n of buildingNotes) {
            const x = (n.time / 30000) * (canvasElem.width - 40) + 20;
            const y = n.y || 250;
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#ff66aa';
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('●', x, y);
        }
        
        for (const d of buildingDoubles) {
            const x1 = (d.time / 30000) * (canvasElem.width - 40) + 20;
            const x2 = x1 + 30;
            ctx.beginPath();
            ctx.arc(x1, d.y1 || 250, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#ff88cc';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x2, d.y2 || 250, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#88aaff';
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x1, (d.y1 || 250));
            ctx.lineTo(x2, (d.y2 || 250));
            ctx.strokeStyle = '#8888cc';
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'white';
            ctx.font = '8px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('1', x1, (d.y1 || 250));
            ctx.fillText('2', x2, (d.y2 || 250));
        }
        
        // Info
        ctx.fillStyle = '#aab3cf';
        ctx.font = '12px monospace';
        ctx.textAlign = 'left';
        ctx.fillText('BUILDER MODE | BPM: ' + bpmVal + ' | Notes: ' + (buildingNotes.length + buildingDoubles.length), 20, 30);
        ctx.fillText('TAP: Place note | TAP near note: Double tap | CLICK note: Delete', 20, 50);
    }
    
    function addNoteToBuilder(canvasX, canvasY) {
        if (!isBuilding) return;
        
        const bpmVal = parseInt(document.getElementById('bpmInput').value) || 120;
        const beatInterval = 60000 / bpmVal;
        const time = (canvasX - 20) / (canvasElem.width - 40) * 30000;
        
        // Check if clicking existing note (delete)
        for (let i = 0; i < buildingNotes.length; i++) {
            const n = buildingNotes[i];
            const nx = (n.time / 30000) * (canvasElem.width - 40) + 20;
            if (Math.hypot(nx - canvasX, n.y - canvasY) < 20) {
                buildingNotes.splice(i, 1);
                updateNoteCount();
                drawBuilder();
                return;
            }
        }
        
        for (let i = 0; i < buildingDoubles.length; i++) {
            const d = buildingDoubles[i];
            const dx = (d.time / 30000) * (canvasElem.width - 40) + 20;
            if (Math.hypot(dx - canvasX, d.y1 - canvasY) < 20) {
                buildingDoubles.splice(i, 1);
                updateNoteCount();
                drawBuilder();
                return;
            }
            if (Math.hypot(dx + 30 - canvasX, d.y2 - canvasY) < 20) {
                buildingDoubles.splice(i, 1);
                updateNoteCount();
                drawBuilder();
                return;
            }
        }
        
        // Add new note
        const y = Math.min(canvasElem.height - 40, Math.max(40, canvasY));
        const snapTime = Math.round(time / beatInterval) * beatInterval;
        const clampedTime = Math.min(29000, Math.max(500, snapTime));
        
        // Check for double tap
        let isDouble = false;
        for (const n of buildingNotes) {
            if (Math.abs(n.time - clampedTime) < 100 && Math.abs(n.y - y) < 60) {
                const existingIdx = buildingNotes.indexOf(n);
                if (existingIdx >= 0) {
                    buildingNotes.splice(existingIdx, 1);
                    buildingDoubles.push({
                        x1: (clampedTime / 30000) * (canvasElem.width - 40) + 20,
                        y1: n.y,
                        x2: (clampedTime / 30000) * (canvasElem.width - 40) + 20 + 30,
                        y2: y,
                        time: clampedTime,
                        type: 'double'
                    });
                    isDouble = true;
                    break;
                }
            }
        }
        
        if (!isDouble) {
            buildingNotes.push({
                x: (clampedTime / 30000) * (canvasElem.width - 40) + 20,
                y: y,
                time: clampedTime,
                type: 'circle'
            });
        }
        
        updateNoteCount();
        drawBuilder();
        document.getElementById('beatmapStatus').innerHTML = 'PLACED NOTE at ' + Math.round(clampedTime) + 'ms';
    }
    
    // ============================================
    // GAME PLAY
    // ============================================
    function startGameFromBuilder() {
        if (buildingNotes.length === 0 && buildingDoubles.length === 0) {
            document.getElementById('beatmapStatus').innerHTML = 'ERROR: No notes to play';
            return;
        }
        
        if (isBuilding) {
            toggleBuilder();
        }
        
        stopMusic();
        
        allNotes = [];
        for (const n of buildingNotes) {
            allNotes.push({
                type: 'circle',
                time: n.time,
                x: (n.time / 30000) * (canvasElem.width - 40) + 20,
                y: n.y,
                radius: difficulties[currentDifficulty].radius,
                approachTime: 1000,
                hit: false,
                id: Math.random()
            });
        }
        
        for (const d of buildingDoubles) {
            const cx = (d.time / 30000) * (canvasElem.width - 40) + 20;
            allNotes.push({
                type: 'double',
                time: d.time,
                x1: cx,
                y1: d.y1,
                x2: cx + 30,
                y2: d.y2,
                radius: difficulties[currentDifficulty].radius - 2,
                approachTime: 1000,
                hit: false,
                tapped: 0,
                id: Math.random()
            });
        }
        
        allNotes.sort((a,b) => a.time - b.time);
        
        gameStarted = true;
        gameActive = true;
        deathTriggered = false;
        nextNoteIndex = 0;
        activeCircles = [];
        activeDoubles = [];
        score = 0; combo = 0; maxCombo = 0; totalHits = 0; misses = 0;
        gameStartTime = performance.now();
        updateUI();
        document.getElementById('beatmapStatus').innerHTML = 'PLAYING...';
        document.getElementById('playBtn').style.background = '#ff3366';
        
        playMusic();
        
        if (animationId) cancelAnimationFrame(animationId);
        function update() {
            if (!gameStarted) { draw(); animationId = requestAnimationFrame(update); return; }
            
            const now = performance.now();
            const elapsed = now - gameStartTime;
            
            if (gameActive && !deathTriggered) {
                while (nextNoteIndex < allNotes.length && elapsed >= allNotes[nextNoteIndex].time - allNotes[nextNoteIndex].approachTime) {
                    const note = allNotes[nextNoteIndex];
                    if (note.type === 'circle') {
                        activeCircles.push({...note});
                    } else if (note.type === 'double') {
                        activeDoubles.push({...note});
                    }
                    nextNoteIndex++;
                }
                
                const timingOk = TIMING.ok * difficulties[currentDifficulty].timingWindow;
                
                for (let i = 0; i < activeCircles.length; i++) {
                    const note = activeCircles[i];
                    if (!note.hit && elapsed > note.time + timingOk + 50) {
                        note.hit = true;
                        combo = 0;
                        misses++;
                        updateUI();
                    }
                }
                activeCircles = activeCircles.filter(n => !n.hit);
                
                for (let i = 0; i < activeDoubles.length; i++) {
                    const note = activeDoubles[i];
                    if (!note.hit && elapsed > note.time + timingOk + 50) {
                        note.hit = true;
                        combo = 0;
                        misses++;
                        updateUI();
                    }
                }
                activeDoubles = activeDoubles.filter(n => !n.hit);
            }
            
            draw();
            animationId = requestAnimationFrame(update);
        }
        update();
    }
    
    // ============================================
    // DRAW FUNCTIONS
    // ============================================
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        ctx.fillStyle = '#11161f';
        ctx.fillRect(0, 0, canvasElem.width, canvasElem.height);
        
        const now = performance.now();
        const elapsed = now - gameStartTime;
        
        // Double tap notes
        for (const d of activeDoubles) {
            const timeToHit = d.time - elapsed;
            const alpha = Math.min(1, Math.max(0.3, 1 - (d.approachTime - timeToHit) / d.approachTime * 0.5));
            
            ctx.beginPath();
            ctx.moveTo(d.x1, d.y1);
            ctx.lineTo(d.x2, d.y2);
            ctx.strokeStyle = `rgba(200, 120, 180, ${alpha * 0.5})`;
            ctx.lineWidth = 3;
            ctx.setLineDash([6, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            const progress = Math.min(1, Math.max(0, 1 - timeToHit / d.approachTime));
            const scale = 1.8 - progress * 0.8;
            
            const isTapped1 = d.tapped >= 1;
            
            ctx.beginPath();
            ctx.arc(d.x1, d.y1, d.radius * scale, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 220, ${isTapped1 ? 0.3 : alpha})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(d.x1, d.y1, d.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = isTapped1 ? `rgba(100, 200, 100, ${alpha})` : `rgba(255, 100, 160, ${alpha})`;
            ctx.fill();
            
            const isTapped2 = d.tapped >= 2;
            
            ctx.beginPath();
            ctx.arc(d.x2, d.y2, d.radius * scale, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 220, ${isTapped2 ? 0.3 : alpha})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(d.x2, d.y2, d.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = isTapped2 ? `rgba(100, 200, 100, ${alpha})` : `rgba(100, 150, 200, ${alpha})`;
            ctx.fill();
            
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.font = `bold ${d.radius - 4}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if (!isTapped1) ctx.fillText("1", d.x1, d.y1 + 1);
            if (!isTapped2) ctx.fillText("2", d.x2, d.y2 + 1);
        }
        
        // Single circles
        for (const c of activeCircles) {
            const timeToHit = c.time - elapsed;
            let scale = 1.0;
            if (timeToHit > 0) {
                const progress = Math.min(1, Math.max(0, 1 - timeToHit / c.approachTime));
                scale = 1.8 - progress * 0.8;
            }
            
            const radius = c.radius * scale;
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 220, ${Math.min(1, 1 - timeToHit / c.approachTime)})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = "#ff66aa";
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 8, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
        }
        
        // Combo
        if (combo >= 5 && gameStarted && gameActive && !deathTriggered) {
            ctx.font = `bold 32px "Courier New"`;
            ctx.fillStyle = "#ffcc66";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff66aa";
            ctx.textAlign = "left";
            ctx.fillText(`${combo}x`, canvasElem.width - 85, 65);
            ctx.shadowBlur = 0;
        }
        
        const prog = Math.min(1, Math.max(0, elapsed / GAME_DURATION));
        ctx.fillStyle = "#ff66aa30";
        ctx.fillRect(20, canvasElem.height - 20, canvasElem.width - 40, 6);
        ctx.fillStyle = "#ff66aa";
        ctx.fillRect(20, canvasElem.height - 20, (canvasElem.width - 40) * prog, 6);
    }
    
    function getCanvasCoords(clientX, clientY) {
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }
    
    // ============================================
    // GAME TAP HANDLER
    // ============================================
    function handleTap(clientX, clientY) {
        const {x, y} = getCanvasCoords(clientX, clientY);
        
        if (isBuilding) {
            addNoteToBuilder(x, y);
            return;
        }
        
        if (!gameActive || gameLocked || quizActive || !gameStarted || deathTriggered) return;
        
        const elapsed = performance.now() - gameStartTime;
        
        // Single circles
        for (let i = 0; i < activeCircles.length; i++) {
            const c = activeCircles[i];
            const dx = c.x - x;
            const dy = c.y - y;
            if (Math.hypot(dx, dy) <= c.radius * 1.5) {
                const timeDiff = Math.abs(elapsed - c.time);
                const scale = difficulties[currentDifficulty].timingWindow;
                
                let points, judgement, color;
                if (timeDiff <= TIMING.perfect * scale) {
                    points = BASE_SCORE;
                    judgement = "PERFECT";
                    color = "#ffd700";
                } else if (timeDiff <= TIMING.good * scale) {
                    points = Math.floor(BASE_SCORE * 0.85);
                    judgement = "GOOD";
                    color = "#88ff88";
                } else if (timeDiff <= TIMING.ok * scale) {
                    points = Math.floor(BASE_SCORE * 0.6);
                    judgement = "OK";
                    color = "#88aaff";
                } else {
                    points = Math.floor(BASE_SCORE * 0.3);
                    judgement = "HIT";
                    color = "#ffaa88";
                }
                
                score += points + Math.floor(combo * 3);
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                totalHits++;
                c.hit = true;
                updateUI();
                showMessage(judgement, clientX, clientY, color);
                return;
            }
        }
        
        // Double tap notes
        for (let i = 0; i < activeDoubles.length; i++) {
            const d = activeDoubles[i];
            if (d.hit) continue;
            
            const timeDiff = Math.abs(elapsed - d.time);
            const scale = difficulties[currentDifficulty].timingWindow;
            if (timeDiff > TIMING.ok * scale) continue;
            
            const dx1 = d.x1 - x;
            const dy1 = d.y1 - y;
            const dist1 = Math.hypot(dx1, dy1);
            
            const dx2 = d.x2 - x;
            const dy2 = d.y2 - y;
            const dist2 = Math.hypot(dx2, dy2);
            
            const tappedCircle1 = dist1 <= d.radius * 1.5;
            const tappedCircle2 = dist2 <= d.radius * 1.5;
            
            if (tappedCircle1 && d.tapped === 0) {
                d.tapped = 1;
                showMessage("1", clientX, clientY, "#88ff88");
                return;
            } else if (tappedCircle1 && d.tapped === 1) {
                return;
            } else if (tappedCircle2 && d.tapped === 0) {
                d.tapped = 1;
                showMessage("1", clientX, clientY, "#88ff88");
                return;
            } else if (tappedCircle2 && d.tapped === 1) {
                d.tapped = 2;
                d.hit = true;
                
                const pointsEarned = DOUBLE_SCORE + Math.floor(combo * 4);
                score += pointsEarned;
                combo += 2;
                if (combo > maxCombo) maxCombo = combo;
                totalHits += 2;
                updateUI();
                showMessage("DOUBLE!", clientX, clientY, "#ff88ff");
                
                const index = activeDoubles.findIndex(dn => dn.id === d.id);
                if (index !== -1) activeDoubles.splice(index, 1);
                return;
            }
        }
        
        combo = 0;
        misses++;
        updateUI();
        showMessage("MISS", clientX, clientY, "#ff6666");
    }
    
    function showMessage(text, x, y, color) {
        const div = document.createElement('div');
        div.className = 'floating-judgement';
        div.textContent = text;
        div.style.left = (x - 40) + 'px';
        div.style.top = (y - 40) + 'px';
        div.style.color = color;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 700);
    }
    
    function updateAccuracy() {
        let acc = totalHits + misses === 0 ? 100 : (totalHits / (totalHits + misses)) * 100;
        document.getElementById('accuracyWarning').innerHTML = 'ACC: ' + acc.toFixed(1) + '%';
        document.getElementById('accValue').innerText = acc.toFixed(1);
        
        if (acc < 60 && gameActive && gameStarted && totalHits + misses > 10 && !deathTriggered) {
            gameActive = false;
            gameStarted = false;
            showDeathScreen();
        }
        return acc;
    }
    
    function showDeathScreen() {
        if (deathTriggered) return;
        deathTriggered = true;
        
        const overlay = document.createElement('div');
        overlay.className = 'death-overlay';
        overlay.innerHTML = `
            <div class="death-container">
                <div class="death-title">GAME OVER</div>
                <div class="death-subtitle">accuracy below 60%</div>
                <button class="death-reload" id="deathReloadBtn">RETRY</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('deathReloadBtn').onclick = () => location.reload();
        setTimeout(() => location.reload(), 3000);
    }
    
    function updateUI() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        document.getElementById('comboValue').innerText = combo;
        updateAccuracy();
    }
    
    // ============================================
    // EVENTS
    // ============================================
    
    canvasElem.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        if (touch) handleTap(touch.clientX, touch.clientY);
    }, { passive: false });
    
    canvasElem.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handleTap(e.clientX, e.clientY);
    });
    
    document.getElementById('playBtn').onclick = () => {
        if (isBuilding) toggleBuilder();
        startGameFromBuilder();
    };
    
    document.getElementById('buildBtn').onclick = toggleBuilder;
    document.getElementById('saveBtn').onclick = saveBeatmap;
    document.getElementById('loadBtn').onclick = loadBeatmapList;
    document.getElementById('clearBtn').onclick = clearBeatmap;
    
    document.getElementById('exportBtn').onclick = exportBeatmap;
    
    document.getElementById('importBtn').onclick = () => {
        document.getElementById('importFileInput').click();
    };
    
    document.getElementById('importFileInput').onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
            importBeatmap(e.target.files[0]);
        }
        e.target.value = '';
    };
    
    document.getElementById('closeListBtn').onclick = () => {
        document.getElementById('beatmapList').classList.remove('active');
    };
    
    document.getElementById('musicFileInput').onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
            loadMusicFile(e.target.files[0]);
        }
    };
    
    document.getElementById('bpmInput').onchange = () => {
        if (isBuilding) drawBuilder();
    };
    
    // ============================================
    // QUESTIONS & INIT
    // ============================================
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error('questions.json not found');
            const data = await response.json();
            questionBank = data.questions || data;
        } catch (error) {
            questionBank = DEFAULT_QUESTIONS;
        }
    }
    
    function startQuiz() {
        const shuffled = [...questionBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const questions = shuffled.slice(0, 3);
        let qIndex = 0;
        
        const overlay = document.createElement('div');
        overlay.className = 'quiz-overlay';
        
        function showQuestion() {
            if (qIndex >= questions.length) {
                overlay.remove();
                startGame();
                return;
            }
            const q = questions[qIndex];
            overlay.innerHTML = `
                <div class="quiz-container">
                    <div class="progress-badge">QUESTION ${qIndex+1}/3</div>
                    <div class="progress-badge" style="color:#88ff88">INFINITE ATTEMPTS</div>
                    <div class="quiz-question">${q.question}</div>
                    <div class="quiz-options">
                        ${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${opt}</div>`).join('')}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.quiz-opt').forEach(btn => {
                btn.onclick = () => {
                    if (parseInt(btn.dataset.opt) === q.correct) {
                        qIndex++;
                        showQuestion();
                    } else {
                        const msg = document.createElement('div');
                        msg.style.cssText = 'color:#ff8888;text-align:center;margin-top:15px';
                        msg.innerText = "WRONG - TRY AGAIN";
                        overlay.querySelector('.quiz-container').appendChild(msg);
                        setTimeout(() => msg.remove(), 1200);
                    }
                };
            });
        }
        
        document.body.appendChild(overlay);
        showQuestion();
    }
    
    function startGame() {
        quizActive = false;
        gameLocked = false;
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });
    }
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
        if (parseInt(btn.dataset.diff) === currentDifficulty) btn.classList.add('active');
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.6';
    });
    
    document.getElementById('gameStatusMsg').innerHTML = 'Loading questions...';
    
    loadQuestions().then(() => {
        document.getElementById('gameStatusMsg').innerHTML = 'Answer 3 questions to start';
        startQuiz();
    });
</script>
