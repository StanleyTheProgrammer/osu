<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>osu! · BLUE DRAG TO PINK · Both Ends Work</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: none;
        }

        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: linear-gradient(135deg, #1e1b2e, #141121);
            border-radius: 48px;
            padding: 25px 20px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #ff88cc;
            box-shadow: 0 0 40px rgba(255, 136, 204, 0.3);
        }

        .quiz-question {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 20px;
            text-align: center;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .quiz-opt {
            background: #2a2342;
            border: 2px solid #5a4a8a;
            padding: 14px 20px;
            border-radius: 60px;
            color: #f0e6ff;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 1rem;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .quiz-opt:active {
            background: #ff66aa;
            transform: scale(0.97);
        }

        .progress-badge {
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ffaa88;
            font-weight: bold;
        }

        .lives-display {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 6px 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff6699;
            pointer-events: none;
            font-family: monospace;
        }

        .accuracy-warning {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 6px 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            color: #ffaa44;
            pointer-events: none;
            font-family: monospace;
        }

        .difficulty-indicator {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 4px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff88cc;
            color: #ff88cc;
            pointer-events: none;
            font-family: monospace;
        }

        .game-container {
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            background: #11161f;
            width: 100%;
            height: auto;
            touch-action: none;
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin: 10px 10px 8px 10px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 60px;
        }

        .stat {
            font-weight: 700;
            font-size: 0.8rem;
        }

        .stat span:first-child {
            color: #aab3cf;
            font-size: 0.6rem;
            text-transform: uppercase;
            margin-right: 4px;
        }

        .stat span:last-child {
            color: #f3e9c0;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: monospace;
        }

        .difficulty-bar {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: #1e2438;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 40px;
            color: #cbd5ff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .diff-btn.active {
            background: #ff66aa;
            color: white;
            box-shadow: 0 0 12px #ff66aa80;
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            background: #292f42;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 6px 16px;
            border-radius: 60px;
            color: #eff3ff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: translateY(2px);
        }

        .result-message {
            text-align: center;
            margin-top: 10px;
            font-weight: 700;
            background: #00000066;
            padding: 4px 10px;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.8rem;
        }

        .footer-meta {
            text-align: center;
            font-size: 0.55rem;
            color: #7f8aa8;
            margin-top: 8px;
        }

        .floating-judgement {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 200;
            animation: floatUp 0.7s ease-out forwards;
            white-space: nowrap;
            font-family: monospace;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.9); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.1); }
        }

        .death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .death-container {
            text-align: center;
            background: #1a0a1a;
            padding: 40px;
            border-radius: 48px;
            border: 2px solid #ff3366;
        }

        .death-title {
            font-size: 3rem;
            font-weight: 900;
            color: #ff3366;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .death-subtitle {
            font-size: 1rem;
            color: #ff8888;
            margin-bottom: 30px;
        }

        .death-reload {
            background: #ff3366;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .floating-judgement { font-size: 1.2rem; }
            .death-title { font-size: 2rem; }
            .quiz-container { padding: 20px 15px; }
            .quiz-question { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="lives-display" id="livesDisplay">LIVES: 2</div>
<div class="accuracy-warning" id="accuracyWarning">ACC: 100%</div>
<div class="difficulty-indicator" id="difficultyIndicator">NORMAL</div>

<div class="game-container">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="info-panel">
        <div class="stats">
            <div class="stat"><span>SCORE</span><span id="scoreValue">0</span></div>
            <div class="stat"><span>ACC</span><span id="accValue">100</span><span style="font-size:0.7rem">%</span></div>
            <div class="stat"><span>COMBO</span><span id="comboValue">0</span></div>
        </div>
        <div class="difficulty-bar" id="difficultySelector">
            <button class="diff-btn" data-diff="0">EASY</button>
            <button class="diff-btn" data-diff="1">NORMAL</button>
            <button class="diff-btn" data-diff="2">HARD</button>
            <button class="diff-btn" data-diff="3">INSANE</button>
        </div>
    </div>

    <div class="action-area">
        <button id="resetGameBtn">NEW GAME</button>
        <button id="restartSameBtn">RESTART</button>
    </div>
    <div style="display: flex; justify-content: center;">
        <div id="gameStatusMsg" class="result-message">Loading questions...</div>
    </div>
    <div class="footer-meta">
        TAP circles • SLIDERS: HOLD on either end and drag along the path • ACCURACY below 60% = GAME OVER
    </div>
</div>

<script>
    const DEFAULT_QUESTIONS = [
        { "question": "How many rooms does Tin Shing Court have?", "options": ["1", "2", "3", "4"], "correct": 2 },
        { "question": "When was Tin Shing Court finished building?", "options": ["1986", "1987", "1999", "2000"], "correct": 2 },
        { "question": "How many times have the Tin Shing Mall been rebuilt?", "options": ["1", "2", "3", "4"], "correct": 0 }
    ];

    const difficulties = [
        { name: "EASY",   circleCount: 20, sliderCount: 3, approachTime: 1300, radius: 40, timingWindow: 1.3 },
        { name: "NORMAL", circleCount: 30, sliderCount: 5, approachTime: 1000, radius: 35, timingWindow: 1.0 },
        { name: "HARD",   circleCount: 45, sliderCount: 8, approachTime: 700, radius: 30, timingWindow: 0.8 },
        { name: "INSANE", circleCount: 60, sliderCount: 12, approachTime: 500, radius: 27, timingWindow: 0.65 }
    ];
    
    const TIMING = { perfect: 45, good: 90, ok: 160 };
    const BASE_SCORE = 250;
    const SLIDER_SCORE = 150;
    const GAME_DURATION = 30000;
    const SLIDER_DURATION_EXTRA = 600;
    
    let canvas, ctx;
    let activeCircles = [];
    let activeSliders = [];
    let draggingSlider = null;
    let dragDirection = 1; // 1 = start->end, -1 = end->start
    let score = 0, combo = 0, maxCombo = 0, totalHits = 0, misses = 0;
    let gameActive = false, gameStarted = false;
    let currentDifficulty = 1;
    let gameStartTime = 0;
    let animationId = null;
    let allNotes = [];
    let nextNoteIndex = 0;
    
    let quizActive = true, gameLocked = true;
    let questionBank = [];
    let deathTriggered = false;
    
    const canvasElem = document.getElementById('gameCanvas');
    canvasElem.width = 800;
    canvasElem.height = 500;
    ctx = canvasElem.getContext('2d');
    
    function showDeathScreen() {
        if (deathTriggered) return;
        deathTriggered = true;
        
        const overlay = document.createElement('div');
        overlay.className = 'death-overlay';
        overlay.innerHTML = `
            <div class="death-container">
                <div class="death-title">GAME OVER</div>
                <div class="death-subtitle">accuracy below 60%</div>
                <button class="death-reload" id="deathReloadBtn">RETRY</button>
            </div>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById('deathReloadBtn').onclick = () => location.reload();
        setTimeout(() => location.reload(), 3000);
    }
    
    function showMessage(text, x, y, color) {
        const div = document.createElement('div');
        div.className = 'floating-judgement';
        div.textContent = text;
        div.style.left = (x - 40) + 'px';
        div.style.top = (y - 40) + 'px';
        div.style.color = color;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 700);
    }
    
    function updateAccuracy() {
        let acc = totalHits + misses === 0 ? 100 : (totalHits / (totalHits + misses)) * 100;
        document.getElementById('accuracyWarning').innerHTML = `ACC: ${acc.toFixed(1)}%`;
        document.getElementById('accValue').innerText = acc.toFixed(1);
        
        if (acc < 60 && gameActive && gameStarted && totalHits + misses > 10 && !deathTriggered) {
            gameActive = false;
            gameStarted = false;
            showDeathScreen();
        }
        return acc;
    }
    
    function updateUI() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        document.getElementById('comboValue').innerText = combo;
        updateAccuracy();
    }
    
    function generateLongSliderPath(startX, startY, endX, endY) {
        const points = [];
        const steps = 40;
        
        const dist = Math.hypot(endX - startX, endY - startY);
        const curveAmount = Math.min(100, dist * 0.5);
        
        const cp1x = startX + (endX - startX) * 0.2 + (Math.random() - 0.5) * curveAmount;
        const cp1y = startY + (endY - startY) * 0.1 + (Math.random() - 0.5) * curveAmount * 0.7;
        const cp2x = startX + (endX - startX) * 0.8 + (Math.random() - 0.5) * curveAmount;
        const cp2y = startY + (endY - startY) * 0.9 + (Math.random() - 0.5) * curveAmount * 0.7;
        
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = Math.pow(1-t,3)*startX + 3*Math.pow(1-t,2)*t*cp1x + 3*(1-t)*Math.pow(t,2)*cp2x + Math.pow(t,3)*endX;
            const y = Math.pow(1-t,3)*startY + 3*Math.pow(1-t,2)*t*cp1y + 3*(1-t)*Math.pow(t,2)*cp2y + Math.pow(t,3)*endY;
            points.push({x, y});
        }
        return points;
    }
    
    function generateNotes() {
        const diff = difficulties[currentDifficulty];
        const startOffset = 1500;
        const endTime = GAME_DURATION;
        const notes = [];
        
        for (let i = 0; i < diff.circleCount; i++) {
            let t = startOffset + (i / diff.circleCount) * (endTime - startOffset - 500);
            t += (Math.random() - 0.5) * 40;
            
            const margin = 70;
            const x = margin + Math.random() * (canvasElem.width - margin * 2);
            const y = margin + Math.random() * (canvasElem.height - margin * 2);
            
            notes.push({
                type: 'circle',
                time: t,
                x: x, y: y,
                radius: diff.radius,
                approachTime: diff.approachTime,
                hit: false,
                id: Math.random()
            });
        }
        
        for (let i = 0; i < diff.sliderCount; i++) {
            let t = startOffset + 800 + (i / diff.sliderCount) * (endTime - startOffset - 1000);
            t += (Math.random() - 0.5) * 50;
            
            const margin = 60;
            const startX = margin + Math.random() * (canvasElem.width - margin * 2);
            const startY = margin + Math.random() * (canvasElem.height - margin * 2);
            
            let endX, endY;
            let distance = 0;
            let attempts = 0;
            do {
                const angle = Math.random() * Math.PI * 2;
                const minDist = 250;
                const maxDist = 420;
                const dist = minDist + Math.random() * (maxDist - minDist);
                
                endX = startX + Math.cos(angle) * dist;
                endY = startY + Math.sin(angle) * dist;
                
                endX = Math.min(canvasElem.width - margin, Math.max(margin, endX));
                endY = Math.min(canvasElem.height - margin, Math.max(margin, endY));
                
                distance = Math.hypot(endX - startX, endY - startY);
                attempts++;
            } while (distance < 200 && attempts < 15);
            
            const points = generateLongSliderPath(startX, startY, endX, endY);
            
            notes.push({
                type: 'slider',
                time: t,
                startX: startX, startY: startY,
                endX: endX, endY: endY,
                points: points,
                radius: diff.radius - 4,
                approachTime: diff.approachTime + SLIDER_DURATION_EXTRA,
                hit: false,
                completed: false,
                dragProgress: 0,
                id: Math.random()
            });
        }
        
        notes.sort((a,b) => a.time - b.time);
        return notes;
    }
    
    function startGame() {
        quizActive = false;
        gameLocked = false;
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });
        
        let countdown = 3;
        const interval = setInterval(() => {
            if (countdown > 0) {
                document.getElementById('gameStatusMsg').innerHTML = `${countdown}...`;
                countdown--;
            } else {
                clearInterval(interval);
                document.getElementById('gameStatusMsg').innerHTML = 'GO!';
                gameStarted = true;
                gameActive = true;
                deathTriggered = false;
                allNotes = generateNotes();
                nextNoteIndex = 0;
                activeCircles = [];
                activeSliders = [];
                draggingSlider = null;
                score = 0; combo = 0; maxCombo = 0; totalHits = 0; misses = 0;
                gameStartTime = performance.now();
                updateUI();
                
                if (animationId) cancelAnimationFrame(animationId);
                function update() {
                    if (!gameStarted) { draw(); animationId = requestAnimationFrame(update); return; }
                    
                    const now = performance.now();
                    const elapsed = now - gameStartTime;
                    
                    if (gameActive && !quizActive && !deathTriggered) {
                        while (nextNoteIndex < allNotes.length && elapsed >= allNotes[nextNoteIndex].time - allNotes[nextNoteIndex].approachTime) {
                            const note = allNotes[nextNoteIndex];
                            if (note.type === 'circle') activeCircles.push({...note});
                            else activeSliders.push({...note});
                            nextNoteIndex++;
                        }
                        
                        const timingOk = TIMING.ok * difficulties[currentDifficulty].timingWindow;
                        for (let i = 0; i < activeCircles.length; i++) {
                            const note = activeCircles[i];
                            if (!note.hit && elapsed > note.time + timingOk + 50) {
                                note.hit = true;
                                combo = 0;
                                misses++;
                                updateUI();
                            }
                        }
                        activeCircles = activeCircles.filter(n => !n.hit);
                        
                        for (let i = 0; i < activeSliders.length; i++) {
                            const slider = activeSliders[i];
                            if (!slider.hit && !slider.completed && elapsed > slider.time + timingOk + 150) {
                                slider.hit = true;
                                combo = 0;
                                misses++;
                                updateUI();
                            }
                        }
                        activeSliders = activeSliders.filter(s => !s.hit && !s.completed);
                    }
                    
                    draw();
                    animationId = requestAnimationFrame(update);
                }
                update();
            }
        }, 1000);
    }
    
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        
        ctx.fillStyle = '#11161f';
        ctx.fillRect(0, 0, canvasElem.width, canvasElem.height);
        
        const now = performance.now();
        const elapsed = now - gameStartTime;
        
        for (const s of activeSliders) {
            const timeToHit = s.time - elapsed;
            const alpha = Math.min(1, Math.max(0.3, 1 - (s.approachTime - timeToHit) / s.approachTime * 0.5));
            
            // Slider path
            ctx.beginPath();
            ctx.moveTo(s.points[0].x, s.points[0].y);
            for (let i = 1; i < s.points.length; i++) {
                ctx.lineTo(s.points[i].x, s.points[i].y);
            }
            ctx.strokeStyle = `rgba(200, 120, 180, ${alpha})`;
            ctx.lineWidth = 6;
            ctx.stroke();
            
            // Start circle (PINK)
            ctx.beginPath();
            ctx.arc(s.startX, s.startY, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(200, 100, 160, ${alpha})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(s.startX, s.startY, s.radius - 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 200, 220, ${alpha})`;
            ctx.fill();
            
            // End circle (CYAN)
            ctx.beginPath();
            ctx.arc(s.endX, s.endY, s.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(100, 150, 200, ${alpha})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(s.endX, s.endY, s.radius - 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(180, 220, 255, ${alpha})`;
            ctx.fill();
            
            // Progress highlight
            if (draggingSlider && draggingSlider.id === s.id && s.dragProgress > 0.01) {
                let progressIndex;
                if (dragDirection === 1) {
                    progressIndex = Math.floor(s.dragProgress * (s.points.length - 1));
                } else {
                    progressIndex = Math.floor((1 - s.dragProgress) * (s.points.length - 1));
                }
                
                for (let i = 0; i <= progressIndex && i < s.points.length; i++) {
                    ctx.beginPath();
                    ctx.arc(s.points[i].x, s.points[i].y, s.radius - 1, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 220, 80, 0.7)`;
                    ctx.fill();
                }
            }
            
            // Current position orb
            if (draggingSlider && draggingSlider.id === s.id) {
                let progressIndex;
                if (dragDirection === 1) {
                    progressIndex = Math.floor(s.dragProgress * (s.points.length - 1));
                } else {
                    progressIndex = Math.floor((1 - s.dragProgress) * (s.points.length - 1));
                }
                
                if (progressIndex < s.points.length) {
                    ctx.beginPath();
                    ctx.arc(s.points[progressIndex].x, s.points[progressIndex].y, s.radius + 4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 200, 0.9)`;
                    ctx.fill();
                }
            }
        }
        
        for (const c of activeCircles) {
            const timeToHit = c.time - elapsed;
            let scale = 1.0;
            if (timeToHit > 0) {
                const progress = Math.min(1, Math.max(0, 1 - timeToHit / c.approachTime));
                scale = 1.8 - progress * 0.8;
            }
            
            const radius = c.radius * scale;
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 220, ${Math.min(1, 1 - timeToHit / c.approachTime)})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = "#ff66aa";
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 8, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
        }
        
        if (combo >= 5 && gameStarted && gameActive && !deathTriggered) {
            ctx.font = `bold 32px "Courier New"`;
            ctx.fillStyle = "#ffcc66";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff66aa";
            ctx.textAlign = "left";
            ctx.fillText(`${combo}x`, canvasElem.width - 85, 65);
            ctx.shadowBlur = 0;
        }
        
        const prog = Math.min(1, Math.max(0, elapsed / GAME_DURATION));
        ctx.fillStyle = "#ff66aa30";
        ctx.fillRect(20, canvasElem.height - 20, canvasElem.width - 40, 6);
        ctx.fillStyle = "#ff66aa";
        ctx.fillRect(20, canvasElem.height - 20, (canvasElem.width - 40) * prog, 6);
    }
    
    function getCanvasCoords(clientX, clientY) {
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }
    
    function handleTap(clientX, clientY) {
        if (!gameActive || gameLocked || quizActive || !gameStarted || deathTriggered) return;
        
        const {x, y} = getCanvasCoords(clientX, clientY);
        const elapsed = performance.now() - gameStartTime;
        
        // Check circles
        for (let i = 0; i < activeCircles.length; i++) {
            const c = activeCircles[i];
            const dx = c.x - x;
            const dy = c.y - y;
            if (Math.hypot(dx, dy) <= c.radius * 1.5) {
                const timeDiff = Math.abs(elapsed - c.time);
                const scale = difficulties[currentDifficulty].timingWindow;
                
                let points, judgement, color;
                if (timeDiff <= TIMING.perfect * scale) {
                    points = BASE_SCORE;
                    judgement = "PERFECT";
                    color = "#ffd700";
                } else if (timeDiff <= TIMING.good * scale) {
                    points = Math.floor(BASE_SCORE * 0.85);
                    judgement = "GOOD";
                    color = "#88ff88";
                } else if (timeDiff <= TIMING.ok * scale) {
                    points = Math.floor(BASE_SCORE * 0.6);
                    judgement = "OK";
                    color = "#88aaff";
                } else {
                    points = Math.floor(BASE_SCORE * 0.3);
                    judgement = "HIT";
                    color = "#ffaa88";
                }
                
                score += points + Math.floor(combo * 3);
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                totalHits++;
                c.hit = true;
                updateUI();
                showMessage(judgement, clientX, clientY, color);
                return;
            }
        }
        
        // ============================================
        // SLIDER: BOTH ENDS WORK - TAP ON EITHER
        // ============================================
        for (let i = 0; i < activeSliders.length; i++) {
            const s = activeSliders[i];
            if (draggingSlider) break;
            
            const distStart = Math.hypot(s.startX - x, s.startY - y);
            const distEnd = Math.hypot(s.endX - x, s.endY - y);
            
            const tappedStart = distStart <= s.radius * 1.8;
            const tappedEnd = distEnd <= s.radius * 1.8;
            
            if ((tappedStart || tappedEnd) && !draggingSlider) {
                const timeDiff = Math.abs(elapsed - s.time);
                const scale = difficulties[currentDifficulty].timingWindow;
                if (timeDiff <= TIMING.ok * scale) {
                    draggingSlider = s;
                    s.dragProgress = 0;
                    s.hit = true;
                    
                    // Set direction based on which end was tapped
                    if (tappedStart) {
                        dragDirection = 1; // Forward: Start -> End
                    } else {
                        dragDirection = -1; // Reverse: End -> Start
                    }
                    
                    // Same message for both directions
                    showMessage("SLIDER", clientX, clientY, "#ff88ff");
                    return;
                }
            }
        }
        
        combo = 0;
        misses++;
        updateUI();
        showMessage("MISS", clientX, clientY, "#ff6666");
    }
    
    function handleDrag(clientX, clientY) {
        if (!gameActive || !gameStarted || deathTriggered) return;
        if (!draggingSlider) return;
        
        const {x, y} = getCanvasCoords(clientX, clientY);
        const s = draggingSlider;
        const points = s.points;
        
        let bestProgress = s.dragProgress;
        let found = false;
        
        for (let i = 0; i < points.length; i++) {
            const dx = points[i].x - x;
            const dy = points[i].y - y;
            if (Math.hypot(dx, dy) <= s.radius * 2.0) {
                found = true;
                let newProgress = i / (points.length - 1);
                if (dragDirection === -1) {
                    newProgress = 1 - newProgress;
                }
                if (newProgress > bestProgress) {
                    bestProgress = newProgress;
                }
            }
        }
        
        if (found && bestProgress > s.dragProgress) {
            s.dragProgress = Math.min(bestProgress, 1.0);
            
            if (s.dragProgress >= 0.98) {
                const pointsEarned = SLIDER_SCORE + Math.floor(combo * 2);
                score += pointsEarned;
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                totalHits++;
                updateUI();
                showMessage("SLIDER END", clientX, clientY, "#88ff88");
                
                const index = activeSliders.findIndex(sl => sl.id === s.id);
                if (index !== -1) activeSliders.splice(index, 1);
                draggingSlider = null;
            }
        }
    }
    
    function handleDragEnd() {
        if (draggingSlider) {
            const s = draggingSlider;
            if (s.dragProgress < 0.85) {
                combo = 0;
                misses++;
                updateUI();
                showMessage("SLIDER FAIL", s.startX, s.startY, "#ff6666");
                const index = activeSliders.findIndex(sl => sl.id === s.id);
                if (index !== -1) activeSliders.splice(index, 1);
            }
            draggingSlider = null;
        }
    }
    
    // Touch events
    canvasElem.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        if (touch) handleTap(touch.clientX, touch.clientY);
    }, { passive: false });
    
    canvasElem.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        if (touch) handleDrag(touch.clientX, touch.clientY);
    }, { passive: false });
    
    canvasElem.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleDragEnd();
    }, { passive: false });
    
    canvasElem.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        handleDragEnd();
    }, { passive: false });
    
    // Mouse events
    let isMouseDown = false;
    canvasElem.addEventListener('mousedown', (e) => {
        e.preventDefault();
        isMouseDown = true;
        handleTap(e.clientX, e.clientY);
    });
    
    window.addEventListener('mousemove', (e) => {
        if (isMouseDown) {
            e.preventDefault();
            handleDrag(e.clientX, e.clientY);
        }
    });
    
    window.addEventListener('mouseup', (e) => {
        if (isMouseDown) {
            isMouseDown = false;
            handleDragEnd();
        }
    });
    
    // UI Buttons
    document.getElementById('resetGameBtn').onclick = () => location.reload();
    document.getElementById('restartSameBtn').onclick = () => location.reload();
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const newDiff = parseInt(btn.dataset.diff);
            if (!isNaN(newDiff) && newDiff !== currentDifficulty) {
                currentDifficulty = newDiff;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('difficultyIndicator').innerHTML = difficulties[currentDifficulty].name;
                if (gameStarted && !gameLocked && !quizActive && !deathTriggered) location.reload();
            }
        };
    });
    
    // Questions
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error('questions.json not found');
            const data = await response.json();
            questionBank = data.questions || data;
            console.log('Loaded from questions.json');
        } catch (error) {
            console.log('Using embedded questions');
            questionBank = DEFAULT_QUESTIONS;
        }
    }
    
    function startQuiz() {
        const shuffled = [...questionBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const questions = shuffled.slice(0, 3);
        let qIndex = 0;
        
        const overlay = document.createElement('div');
        overlay.className = 'quiz-overlay';
        
        function showQuestion() {
            if (qIndex >= questions.length) {
                overlay.remove();
                startGame();
                return;
            }
            const q = questions[qIndex];
            overlay.innerHTML = `
                <div class="quiz-container">
                    <div class="progress-badge">QUESTION ${qIndex+1}/3</div>
                    <div class="progress-badge" style="color:#88ff88">INFINITE ATTEMPTS</div>
                    <div class="quiz-question">${q.question}</div>
                    <div class="quiz-options">
                        ${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${opt}</div>`).join('')}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.quiz-opt').forEach(btn => {
                btn.onclick = () => {
                    if (parseInt(btn.dataset.opt) === q.correct) {
                        qIndex++;
                        showQuestion();
                    } else {
                        const msg = document.createElement('div');
                        msg.style.cssText = 'color:#ff8888;text-align:center;margin-top:15px';
                        msg.innerText = "WRONG - TRY AGAIN";
                        overlay.querySelector('.quiz-container').appendChild(msg);
                        setTimeout(() => msg.remove(), 1200);
                    }
                };
            });
        }
        
        document.body.appendChild(overlay);
        showQuestion();
    }
    
    // Init
    document.querySelectorAll('.diff-btn').forEach(btn => {
        if (parseInt(btn.dataset.diff) === currentDifficulty) btn.classList.add('active');
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.6';
    });
    
    document.getElementById('gameStatusMsg').innerHTML = 'Loading questions...';
    
    loadQuestions().then(() => {
        document.getElementById('gameStatusMsg').innerHTML = 'Answer 3 questions to start';
        startQuiz();
    });
</script>
</body>
