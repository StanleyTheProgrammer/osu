<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>osu! Style · Beautiful Drag Notes · Auto-Refresh</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: linear-gradient(135deg, #1e1b2e, #141121);
            border-radius: 48px;
            padding: 30px 25px;
            max-width: 550px;
            width: 90%;
            border: 2px solid #ff88cc;
            box-shadow: 0 0 40px rgba(255, 136, 204, 0.3);
        }

        .quiz-question {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 25px;
            text-align: center;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .quiz-opt {
            background: #2a2342;
            border: 2px solid #5a4a8a;
            padding: 14px 20px;
            border-radius: 60px;
            color: #f0e6ff;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .quiz-opt:active {
            background: #ff66aa;
            transform: scale(0.98);
        }

        .progress-badge {
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ffaa88;
            font-weight: bold;
        }

        .lives-display {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff6699;
            pointer-events: none;
        }

        .accuracy-warning {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            color: #ffaa44;
            pointer-events: none;
        }

        .difficulty-indicator {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff88cc;
            color: #ff88cc;
            pointer-events: none;
        }

        .game-container {
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #11161f;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 15px 15px 10px 15px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 60px;
        }

        .stat {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .stat span:first-child {
            color: #aab3cf;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-right: 6px;
        }

        .stat span:last-child {
            color: #f3e9c0;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .difficulty-bar {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: #1e2438;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 5px 14px;
            border-radius: 40px;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .diff-btn.active {
            background: #ff66aa;
            color: white;
            box-shadow: 0 0 12px #ff66aa80;
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        button {
            background: #292f42;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 60px;
            color: #eff3ff;
            cursor: pointer;
            transition: 0.15s linear;
        }

        button:active {
            transform: translateY(2px);
        }

        .result-message {
            text-align: center;
            margin-top: 12px;
            font-weight: 700;
            background: #00000066;
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-block;
            font-size: 0.85rem;
        }

        .footer-meta {
            text-align: center;
            font-size: 0.65rem;
            color: #7f8aa8;
            margin-top: 12px;
        }

        .floating-judgement {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 200;
            animation: floatUp 0.8s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { opacity: 1; transform: translateY(-40px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-80px) scale(0.9); }
        }

        /* Death overlay */
        .death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .death-container {
            text-align: center;
            background: linear-gradient(135deg, #2a1a2a, #1a0a1a);
            padding: 50px;
            border-radius: 60px;
            border: 3px solid #ff0000;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
        }

        .death-title {
            font-size: 4rem;
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            margin-bottom: 20px;
        }

        .death-subtitle {
            font-size: 1.5rem;
            color: #ff8888;
            margin-bottom: 30px;
        }

        .death-reload {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .death-reload:active {
            transform: scale(0.95);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .floating-judgement { font-size: 1.5rem; }
            .difficulty-indicator { font-size: 0.75rem; top: 60px; }
            .death-title { font-size: 2.5rem; }
            .death-subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="lives-display" id="livesDisplay">❤️ LIVES: 2</div>
<div class="accuracy-warning" id="accuracyWarning">📊 ACC: 100%</div>
<div class="difficulty-indicator" id="difficultyIndicator">⚔️ NORMAL ⚔️</div>

<div class="game-container">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="info-panel">
        <div class="stats">
            <div class="stat"><span>🎯 SCORE</span><span id="scoreValue">0</span></div>
            <div class="stat"><span>💯 ACC</span><span id="accValue">100</span><span style="font-size:0.8rem">%</span></div>
            <div class="stat"><span>⭐ COMBO</span><span id="comboValue">0</span></div>
        </div>
        <div class="difficulty-bar" id="difficultySelector">
            <button class="diff-btn" data-diff="0">🍃 EASY</button>
            <button class="diff-btn" data-diff="1">🔥 NORMAL</button>
            <button class="diff-btn" data-diff="2">💀 HARD</button>
            <button class="diff-btn" data-diff="3">🌋 INSANE</button>
        </div>
    </div>

    <div class="action-area">
        <button id="resetGameBtn">🔄 NEW GAME</button>
        <button id="restartSameBtn">🎵 RESTART</button>
    </div>
    <div style="display: flex; justify-content: center;">
        <div id="gameStatusMsg" class="result-message">✨ Answer 3 questions to start!</div>
    </div>
    <div class="footer-meta">
        🎧 TAP circles • HOLD & DRAG on sliders (follow the glow) • Accuracy &lt;60% = DEATH
    </div>
</div>

<script>
    const difficulties = [
        { name: "EASY",   circleCount: 25, sliderCount: 4, approachTime: 1300, radius: 38, timingWindow: 1.3, color: "#88ff88" },
        { name: "NORMAL", circleCount: 38, sliderCount: 7, approachTime: 1000, radius: 34, timingWindow: 1.0, color: "#ffaa66" },
        { name: "HARD",   circleCount: 55, sliderCount: 11, approachTime: 700, radius: 30, timingWindow: 0.8, color: "#ff6666" },
        { name: "INSANE", circleCount: 75, sliderCount: 16, approachTime: 500, radius: 27, timingWindow: 0.65, color: "#ff44ff" }
    ];
    
    const TIMING = { perfect: 45, good: 90, ok: 160 };
    const BASE_SCORE = 250;
    const SLIDER_SCORE = 150;
    const GAME_DURATION = 34000;
    
    let canvas, ctx;
    let activeCircles = [];
    let activeSliders = [];
    let currentDrag = null;
    let dragStartTime = 0;
    let score = 0, combo = 0, maxCombo = 0, totalHits = 0, misses = 0;
    let gameActive = false, gameStarted = false;
    let currentDifficulty = 1;
    let gameStartTime = 0;
    let animationId = null;
    let allNotes = [];
    let nextNoteIndex = 0;
    
    let lives = 2;
    let quizActive = true, gameLocked = true;
    let questionBank = [];
    let deathTriggered = false;
    
    const canvasElem = document.getElementById('gameCanvas');
    canvasElem.width = 800;
    canvasElem.height = 500;
    ctx = canvasElem.getContext('2d');
    
    function showDeathScreen() {
        if (deathTriggered) return;
        deathTriggered = true;
        
        const overlay = document.createElement('div');
        overlay.className = 'death-overlay';
        overlay.innerHTML = `
            <div class="death-container">
                <div class="death-title">💀 GAME OVER 💀</div>
                <div class="death-subtitle">Accuracy fell below 60%</div>
                <button class="death-reload" id="deathReloadBtn">🔄 TRY AGAIN</button>
            </div>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById('deathReloadBtn').onclick = () => location.reload();
        
        // Auto-refresh after 3 seconds
        setTimeout(() => location.reload(), 3000);
    }
    
    function showMessage(text, x, y, color) {
        const div = document.createElement('div');
        div.className = 'floating-judgement';
        div.textContent = text;
        div.style.left = (x - 50) + 'px';
        div.style.top = (y - 50) + 'px';
        div.style.color = color;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 800);
    }
    
    function updateAccuracy() {
        let acc = totalHits + misses === 0 ? 100 : (totalHits / (totalHits + misses)) * 100;
        document.getElementById('accuracyWarning').innerHTML = `📊 ACC: ${acc.toFixed(1)}%`;
        document.getElementById('accValue').innerText = acc.toFixed(1);
        
        if (acc < 60 && gameActive && gameStarted && totalHits + misses > 10 && !deathTriggered) {
            gameActive = false;
            gameStarted = false;
            showDeathScreen();
        }
        return acc;
    }
    
    function updateUI() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        document.getElementById('comboValue').innerText = combo;
        updateAccuracy();
    }
    
    function generateBezierPath(startX, startY, endX, endY) {
        const points = [];
        const steps = 30;
        
        // Control points for a beautiful S-curve
        const cp1x = startX + (endX - startX) * 0.25 + (Math.random() - 0.5) * 40;
        const cp1y = startY + (endY - startY) * 0.2 + (Math.random() - 0.5) * 60;
        const cp2x = startX + (endX - startX) * 0.75 + (Math.random() - 0.5) * 40;
        const cp2y = startY + (endY - startY) * 0.8 + (Math.random() - 0.5) * 60;
        
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = Math.pow(1-t,3)*startX + 3*Math.pow(1-t,2)*t*cp1x + 3*(1-t)*Math.pow(t,2)*cp2x + Math.pow(t,3)*endX;
            const y = Math.pow(1-t,3)*startY + 3*Math.pow(1-t,2)*t*cp1y + 3*(1-t)*Math.pow(t,2)*cp2y + Math.pow(t,3)*endY;
            points.push({x, y});
        }
        return points;
    }
    
    function generateNotes() {
        const diff = difficulties[currentDifficulty];
        const startOffset = 1500;
        const endTime = GAME_DURATION;
        const notes = [];
        
        // Generate circles
        for (let i = 0; i < diff.circleCount; i++) {
            let t = startOffset + (i / diff.circleCount) * (endTime - startOffset - 500);
            t += (Math.random() - 0.5) * 40;
            
            const margin = 70;
            const x = margin + Math.random() * (canvasElem.width - margin * 2);
            const y = margin + Math.random() * (canvasElem.height - margin * 2);
            
            notes.push({
                type: 'circle',
                time: t,
                x: x, y: y,
                radius: diff.radius,
                approachTime: diff.approachTime,
                hit: false,
                id: Math.random()
            });
        }
        
        // Generate sliders with beautiful paths
        for (let i = 0; i < diff.sliderCount; i++) {
            let t = startOffset + 800 + (i / diff.sliderCount) * (endTime - startOffset - 1000);
            t += (Math.random() - 0.5) * 50;
            
            const margin = 80;
            const startX = margin + Math.random() * (canvasElem.width - margin * 2);
            const startY = margin + Math.random() * (canvasElem.height - margin * 2);
            
            let endX = startX + (Math.random() - 0.5) * 180;
            let endY = startY + (Math.random() - 0.5) * 120;
            endX = Math.min(canvasElem.width - margin, Math.max(margin, endX));
            endY = Math.min(canvasElem.height - margin, Math.max(margin, endY));
            
            const points = generateBezierPath(startX, startY, endX, endY);
            
            notes.push({
                type: 'slider',
                time: t,
                startX: startX, startY: startY,
                endX: endX, endY: endY,
                points: points,
                radius: diff.radius - 4,
                approachTime: diff.approachTime,
                hit: false,
                completed: false,
                dragProgress: 0,
                id: Math.random()
            });
        }
        
        notes.sort((a,b) => a.time - b.time);
        return notes;
    }
    
    function startGame() {
        quizActive = false;
        gameLocked = false;
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });
        
        let countdown = 3;
        const interval = setInterval(() => {
            if (countdown > 0) {
                document.getElementById('gameStatusMsg').innerHTML = `🎯 ${countdown}...`;
                countdown--;
            } else {
                clearInterval(interval);
                document.getElementById('gameStatusMsg').innerHTML = '🎵 GO!';
                gameStarted = true;
                gameActive = true;
                deathTriggered = false;
                allNotes = generateNotes();
                nextNoteIndex = 0;
                activeCircles = [];
                activeSliders = [];
                score = 0; combo = 0; maxCombo = 0; totalHits = 0; misses = 0;
                gameStartTime = performance.now();
                updateUI();
                
                if (animationId) cancelAnimationFrame(animationId);
                function update() {
                    if (!gameStarted) { draw(); animationId = requestAnimationFrame(update); return; }
                    
                    const now = performance.now();
                    const elapsed = now - gameStartTime;
                    
                    if (gameActive && !quizActive && !deathTriggered) {
                        // Spawn new notes
                        while (nextNoteIndex < allNotes.length && elapsed >= allNotes[nextNoteIndex].time - allNotes[nextNoteIndex].approachTime) {
                            const note = allNotes[nextNoteIndex];
                            if (note.type === 'circle') activeCircles.push({...note});
                            else activeSliders.push({...note});
                            nextNoteIndex++;
                        }
                        
                        // Check misses for circles
                        const timingOk = TIMING.ok * difficulties[currentDifficulty].timingWindow;
                        for (let i = 0; i < activeCircles.length; i++) {
                            const note = activeCircles[i];
                            if (!note.hit && elapsed > note.time + timingOk + 50) {
                                note.hit = true;
                                combo = 0;
                                misses++;
                                updateUI();
                                showMessage("MISS", note.x, note.y, "#ff6666");
                            }
                        }
                        activeCircles = activeCircles.filter(n => !n.hit);
                        
                        // Check misses for sliders
                        for (let i = 0; i < activeSliders.length; i++) {
                            const slider = activeSliders[i];
                            if (!slider.hit && !slider.completed && elapsed > slider.time + timingOk + 100) {
                                slider.hit = true;
                                combo = 0;
                                misses++;
                                updateUI();
                                showMessage("MISS", slider.startX, slider.startY, "#ff6666");
                            }
                        }
                        activeSliders = activeSliders.filter(s => !s.hit && !s.completed);
                    }
                    
                    draw();
                    animationId = requestAnimationFrame(update);
                }
                update();
            }
        }, 1000);
    }
    
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        
        // Background
        const grad = ctx.createLinearGradient(0, 0, canvasElem.width, canvasElem.height);
        grad.addColorStop(0, '#141b2b');
        grad.addColorStop(1, '#0e1322');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvasElem.width, canvasElem.height);
        
        const now = performance.now();
        const elapsed = now - gameStartTime;
        
        // Draw sliders first (so circles are on top)
        for (const s of activeSliders) {
            const timeToHit = s.time - elapsed;
            const alpha = Math.min(1, Math.max(0.4, 1 - (s.approachTime - timeToHit) / s.approachTime * 0.5));
            const glowIntensity = currentDrag && currentDrag.id === s.id ? 1 : 0.6;
            
            // Draw glow effect on path
            ctx.shadowBlur = 12;
            ctx.shadowColor = currentDrag && currentDrag.id === s.id ? '#ff88ff' : '#ff44aa';
            
            // Draw slider path with gradient
            ctx.beginPath();
            ctx.moveTo(s.points[0].x, s.points[0].y);
            for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
            
            const gradient = ctx.createLinearGradient(s.startX, s.startY, s.endX, s.endY);
            gradient.addColorStop(0, `rgba(255, 100, 180, ${alpha * glowIntensity})`);
            gradient.addColorStop(1, `rgba(255, 60, 220, ${alpha * glowIntensity})`);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 10;
            ctx.stroke();
            
            // Draw tick markers along the path
            ctx.shadowBlur = 0;
            for (let i = 0; i < s.points.length; i += 3) {
                ctx.beginPath();
                ctx.arc(s.points[i].x, s.points[i].y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 255, ${alpha * 0.8})`;
                ctx.fill();
            }
            
            // Draw start circle (pulsing)
            ctx.beginPath();
            ctx.arc(s.startX, s.startY, s.radius + (currentDrag && currentDrag.id === s.id ? 5 : 0), 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 80, 160, ${alpha})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(s.startX, s.startY, s.radius - 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 200, 240, ${alpha})`;
            ctx.fill();
            
            // Draw star icon on start
            ctx.font = `${s.radius - 6}px "Segoe UI"`;
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.fillText("●", s.startX - 7, s.startY + 6);
            
            // Draw end circle (target)
            ctx.beginPath();
            ctx.arc(s.endX, s.endY, s.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 150, 200, ${alpha})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(s.endX, s.endY, s.radius - 8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 200, ${alpha})`;
            ctx.fill();
            
            // Draw progress highlight while dragging
            if (currentDrag && currentDrag.id === s.id && s.dragProgress > 0) {
                const progressIndex = Math.floor(s.dragProgress * (s.points.length - 1));
                for (let i = 0; i <= progressIndex; i++) {
                    ctx.beginPath();
                    ctx.arc(s.points[i].x, s.points[i].y, s.radius - 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 100, 0.7)`;
                    ctx.fill();
                }
            }
            
            // Draw trailing orb while dragging
            if (currentDrag && currentDrag.id === s.id) {
                const trailIndex = Math.floor((s.dragProgress || 0) * (s.points.length - 1));
                if (trailIndex < s.points.length) {
                    ctx.beginPath();
                    ctx.arc(s.points[trailIndex].x, s.points[trailIndex].y, s.radius + 6, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 180, 0.8)`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(s.points[trailIndex].x, s.points[trailIndex].y, s.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, 1)`;
                    ctx.fill();
                }
            }
        }
        
        // Draw circles
        for (const c of activeCircles) {
            const timeToHit = c.time - elapsed;
            let scale = 1.0;
            if (timeToHit > 0) {
                const progress = Math.min(1, Math.max(0, 1 - timeToHit / c.approachTime));
                scale = 1.8 - progress * 0.8;
            }
            
            const radius = c.radius * scale;
            ctx.beginPath();
            ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 200, 255, ${Math.min(1, 1 - timeToHit / c.approachTime)})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = "#ff66aa";
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff66aa";
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 8, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // Combo display
        if (combo >= 5 && gameStarted && gameActive && !deathTriggered) {
            ctx.font = `bold 36px "Montserrat"`;
            ctx.fillStyle = "#ffe6b3";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff66aa";
            ctx.fillText(`${combo}x`, canvasElem.width - 90, 70);
            ctx.shadowBlur = 0;
        }
        
        // Progress bar
        const prog = Math.min(1, Math.max(0, elapsed / GAME_DURATION));
        ctx.fillStyle = "#ff66aa90";
        ctx.fillRect(20, canvasElem.height - 25, (canvasElem.width - 40) * prog, 8);
        ctx.fillStyle = "#ffffff30";
        ctx.fillRect(20, canvasElem.height - 25, canvasElem.width - 40, 8);
        ctx.fillStyle = "#ffaaee";
        ctx.fillRect(20, canvasElem.height - 25, (canvasElem.width - 40) * prog, 8);
    }
    
    function handleTap(clientX, clientY) {
        if (!gameActive || gameLocked || quizActive || !gameStarted || deathTriggered) return;
        
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        const elapsed = performance.now() - gameStartTime;
        
        // Check circles
        for (let i = 0; i < activeCircles.length; i++) {
            const c = activeCircles[i];
            const dx = c.x - canvasX;
            const dy = c.y - canvasY;
            if (Math.hypot(dx, dy) <= c.radius * 1.5) {
                const timeDiff = Math.abs(elapsed - c.time);
                const timing = TIMING;
                const scale = difficulties[currentDifficulty].timingWindow;
                
                let points, judgement, color;
                if (timeDiff <= timing.perfect * scale) {
                    points = BASE_SCORE;
                    judgement = "PERFECT!";
                    color = "#ffd700";
                } else if (timeDiff <= timing.good * scale) {
                    points = Math.floor(BASE_SCORE * 0.85);
                    judgement = "GOOD!";
                    color = "#88ff88";
                } else if (timeDiff <= timing.ok * scale) {
                    points = Math.floor(BASE_SCORE * 0.6);
                    judgement = "OK";
                    color = "#88aaff";
                } else {
                    points = Math.floor(BASE_SCORE * 0.3);
                    judgement = "HIT";
                    color = "#ffaa88";
                }
                
                score += points + Math.floor(combo * 3);
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                totalHits++;
                c.hit = true;
                updateUI();
                showMessage(judgement, clientX, clientY, color);
                return;
            }
        }
        
        // Check sliders
        for (let i = 0; i < activeSliders.length; i++) {
            const s = activeSliders[i];
            const dx = s.startX - canvasX;
            const dy = s.startY - canvasY;
            if (Math.hypot(dx, dy) <= s.radius * 1.5 && !currentDrag) {
                const timeDiff = Math.abs(elapsed - s.time);
                const scale = difficulties[currentDifficulty].timingWindow;
                if (timeDiff <= TIMING.ok * scale) {
                    currentDrag = s;
                    s.dragProgress = 0;
                    s.hit = true;
                    showMessage("DRAG!", clientX, clientY, "#ff88ff");
                    return;
                }
            }
        }
        
        // Miss
        combo = 0;
        misses++;
        updateUI();
        showMessage("MISS", clientX, clientY, "#ff6666");
    }
    
    function handleDrag(clientX, clientY) {
        if (!currentDrag || !gameActive || !gameStarted || deathTriggered) return;
        
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        const canvasX = (clientX - rect.left) * scaleX;
        const canvasY = (clientY - rect.top) * scaleY;
        
        const points = currentDrag.points;
        let bestProgress = currentDrag.dragProgress;
        
        for (let i = Math.floor(bestProgress * (points.length - 1)); i < points.length; i++) {
            const dx = points[i].x - canvasX;
            const dy = points[i].y - canvasY;
            if (Math.hypot(dx, dy) <= currentDrag.radius * 1.5) {
                bestProgress = Math.max(bestProgress, i / (points.length - 1));
            }
        }
        
        if (bestProgress > currentDrag.dragProgress) {
            currentDrag.dragProgress = bestProgress;
            
            if (currentDrag.dragProgress >= 0.98) {
                const points = SLIDER_SCORE + Math.floor(combo * 2);
                score += points;
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                totalHits++;
                updateUI();
                showMessage("SLIDER END", clientX, clientY, "#ff88ff");
                
                const index = activeSliders.findIndex(s => s.id === currentDrag.id);
                if (index !== -1) activeSliders.splice(index, 1);
                currentDrag = null;
            }
        }
    }
    
    function handleDragEnd() {
        if (currentDrag) {
            if (currentDrag.dragProgress < 0.95) {
                combo = 0;
                misses++;
                updateUI();
                showMessage("SLIDER FAIL", currentDrag.startX, currentDrag.startY, "#ff6666");
                const index = activeSliders.findIndex(s => s.id === currentDrag.id);
                if (index !== -1) activeSliders.splice(index, 1);
            }
            currentDrag = null;
        }
    }
    
    // Event handlers
    canvasElem.addEventListener('touchstart', (e) => { e.preventDefault(); const t = e.touches[0]; handleTap(t.clientX, t.clientY); });
    canvasElem.addEventListener('touchmove', (e) => { e.preventDefault(); const t = e.touches[0]; handleDrag(t.clientX, t.clientY); });
    canvasElem.addEventListener('touchend', (e) => { e.preventDefault(); handleDragEnd(); });
    canvasElem.addEventListener('mousedown', (e) => { e.preventDefault(); handleTap(e.clientX, e.clientY); });
    window.addEventListener('mousemove', (e) => { if (e.buttons === 1) handleDrag(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => handleDragEnd());
    
    document.getElementById('resetGameBtn').onclick = () => location.reload();
    document.getElementById('restartSameBtn').onclick = () => location.reload();
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const newDiff = parseInt(btn.dataset.diff);
            if (!isNaN(newDiff) && newDiff !== currentDifficulty) {
                currentDifficulty = newDiff;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('difficultyIndicator').innerHTML = `⚔️ ${difficulties[currentDifficulty].name} ⚔️`;
                document.getElementById('difficultyIndicator').style.borderColor = difficulties[currentDifficulty].color;
                document.getElementById('difficultyIndicator').style.color = difficulties[currentDifficulty].color;
                if (gameStarted && !gameLocked && !quizActive && !deathTriggered) location.reload();
            }
        };
    });
    
    async function loadQuestions() {
        try {
            const res = await fetch('questions.json');
            if (!res.ok) throw new Error();
            const data = await res.json();
            questionBank = data.questions || data;
        } catch(e) {
            questionBank = [
                { question: "What is the capital of France?", options: ["London", "Berlin", "Paris", "Madrid"], correct: 2 },
                { question: "What is 2 + 2?", options: ["3", "4", "5", "6"], correct: 1 },
                { question: "Who painted the Mona Lisa?", options: ["Van Gogh", "Picasso", "Da Vinci", "Rembrandt"], correct: 2 },
                { question: "Which planet is known as the Red Planet?", options: ["Mars", "Jupiter", "Venus", "Saturn"], correct: 0 },
                { question: "What is the largest ocean?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 }
            ];
        }
    }
    
    function startQuiz() {
        const shuffled = [...questionBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const questions = shuffled.slice(0, 3);
        let qIndex = 0;
        
        const overlay = document.createElement('div');
        overlay.className = 'quiz-overlay';
        
        function showQuestion() {
            if (qIndex >= questions.length) {
                overlay.remove();
                startGame();
                return;
            }
            const q = questions[qIndex];
            overlay.innerHTML = `<div class="quiz-container"><div class="progress-badge">📚 QUESTION ${qIndex+1}/3</div><div class="progress-badge" style="color:#88ff88">✨ Infinite attempts!</div><div class="quiz-question">${q.question}</div><div class="quiz-options">${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${opt}</div>`).join('')}</div></div>`;
            
            document.querySelectorAll('.quiz-opt').forEach(btn => {
                btn.onclick = () => {
                    if (parseInt(btn.dataset.opt) === q.correct) {
                        qIndex++;
                        showQuestion();
                    } else {
                        const msg = document.createElement('div');
                        msg.style.cssText = 'color:#ff8888;text-align:center;margin-top:15px';
                        msg.innerText = '❌ Try again!';
                        overlay.querySelector('.quiz-container').appendChild(msg);
                        setTimeout(() => msg.remove(), 1200);
                    }
                };
            });
        }
        
        document.body.appendChild(overlay);
        showQuestion();
    }
    
    // Initialize
    document.querySelectorAll('.diff-btn').forEach(btn => {
        if (parseInt(btn.dataset.diff) === currentDifficulty) btn.classList.add('active');
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.6';
    });
    document.getElementById('difficultyIndicator').style.borderColor = difficulties[currentDifficulty].color;
    document.getElementById('difficultyIndicator').style.color = difficulties[currentDifficulty].color;
    
    loadQuestions().then(() => startQuiz());
</script>
</body>
