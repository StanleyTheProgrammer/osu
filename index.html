<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>osu! · Rhythm Game</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
            -webkit-touch-callout: none;
        }

        body {
            background: #0a0f1e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 15px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            width: 100%;
            max-width: 820px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            background: #11161f;
            width: 100%;
            height: auto;
            touch-action: none;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            padding: 8px 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 16px;
            align-items: center;
            margin-top: 10px;
        }

        .controls button {
            background: #292f42;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            color: #eff3ff;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }

        .controls button:active {
            transform: scale(0.95);
        }

        .controls button.primary {
            background: #ff66aa;
            color: white;
        }

        .controls button.danger {
            background: #ff3366;
            color: white;
        }

        .controls button.diff-btn {
            background: #1e2438;
            color: #cbd5ff;
            font-size: 0.65rem;
            padding: 3px 8px;
        }

        .controls button.diff-btn.active {
            background: #ff66aa;
            color: white;
            box-shadow: 0 0 12px #ff66aa80;
        }

        .controls label {
            color: #aab3cf;
            font-size: 0.6rem;
            font-weight: bold;
        }

        .controls input {
            background: #1e2438;
            border: 1px solid #4a4a6a;
            border-radius: 40px;
            padding: 2px 8px;
            color: #f0e6ff;
            font-family: inherit;
            font-size: 0.65rem;
            outline: none;
            min-width: 80px;
        }

        .controls input:focus {
            border-color: #ff66aa;
        }

        .controls input[type="file"] {
            min-width: 100px;
            padding: 2px 6px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .status-bar span {
            color: #aab3cf;
            font-size: 0.6rem;
            font-family: monospace;
        }

        .lives-display {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff6699;
            pointer-events: none;
            font-family: monospace;
        }

        .accuracy-warning {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.8);
            padding: 4px 12px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            color: #ffaa44;
            pointer-events: none;
            font-family: monospace;
        }

        .difficulty-indicator {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 4px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff88cc;
            color: #ff88cc;
            pointer-events: none;
            font-family: monospace;
        }

        .floating-judgement {
            position: fixed;
            pointer-events: none;
            font-size: 1.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 200;
            animation: floatUp 0.7s ease-out forwards;
            white-space: nowrap;
            font-family: monospace;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.9); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.1); }
        }

        .death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .death-container {
            text-align: center;
            background: #1a0a1a;
            padding: 40px;
            border-radius: 48px;
            border: 2px solid #ff3366;
        }

        .death-title {
            font-size: 3rem;
            font-weight: 900;
            color: #ff3366;
            margin-bottom: 20px;
            font-family: monospace;
        }

        .death-subtitle {
            font-size: 1rem;
            color: #ff8888;
            margin-bottom: 30px;
        }

        .death-reload {
            background: #ff3366;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1rem;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }

        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: linear-gradient(135deg, #1e1b2e, #141121);
            border-radius: 48px;
            padding: 25px 20px;
            max-width: 500px;
            width: 90%;
            border: 2px solid #ff88cc;
            box-shadow: 0 0 40px rgba(255, 136, 204, 0.3);
        }

        .quiz-question {
            font-size: 1.2rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 20px;
            text-align: center;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .quiz-opt {
            background: #2a2342;
            border: 2px solid #5a4a8a;
            padding: 12px 18px;
            border-radius: 60px;
            color: #f0e6ff;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 0.95rem;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .quiz-opt:active {
            background: #ff66aa;
            transform: scale(0.97);
        }

        .progress-badge {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: #ffaa88;
            font-weight: bold;
        }

        .file-size {
            color: #88aaff;
            font-size: 0.6rem;
        }

        .music-status {
            color: #88ff88;
            font-weight: bold;
        }

        .music-status.loading {
            color: #ffaa44;
        }

        .music-status.error {
            color: #ff6666;
        }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .floating-judgement { font-size: 1.2rem; }
            .death-title { font-size: 2rem; }
            .controls { gap: 4px; }
            .controls button { font-size: 0.55rem; padding: 3px 8px; }
            .controls input { font-size: 0.55rem; padding: 2px 6px; min-width: 60px; }
            .controls input[type="file"] { min-width: 80px; }
            .quiz-container { padding: 15px; }
            .quiz-question { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="lives-display" id="livesDisplay">LIVES: 2</div>
<div class="accuracy-warning" id="accuracyWarning">ACC: 100%</div>
<div class="difficulty-indicator" id="difficultyIndicator">NORMAL</div>

<div class="game-container">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="controls">
        <button class="primary" id="playBtn">PLAY</button>
        <button id="resetBtn">RESTART</button>
        <button id="clearMusicBtn" class="danger">CLEAR</button>
        
        <span style="color:#666;font-size:0.6rem;">|</span>
        
        <button class="diff-btn" data-diff="0">EASY</button>
        <button class="diff-btn active" data-diff="1">NORMAL</button>
        <button class="diff-btn" data-diff="2">HARD</button>
        <button class="diff-btn" data-diff="3">INSANE</button>
        
        <span style="color:#666;font-size:0.6rem;">|</span>
        
        <label>MUSIC</label>
        <input type="file" id="musicFileInput" accept="audio/*">
        <span id="fileSizeDisplay" class="file-size"></span>
    </div>
    
    <div class="status-bar">
        <span id="scoreDisplay">SCORE: 0</span>
        <span id="comboDisplay">COMBO: 0</span>
        <span id="musicStatus" class="music-status">NO MUSIC</span>
        <span id="gameStatus">READY</span>
    </div>
</div>

<script>
    // ============================================
    // OSU! GAME + INDEXEDDB MUSIC
    // ============================================
    
    const DEFAULT_QUESTIONS = [
        { "question": "How many rooms does Tin Shing Court have?", "options": ["1", "2", "3", "4"], "correct": 2 },
        { "question": "When was Tin Shing Court finished building?", "options": ["1986", "1987", "1999", "2000"], "correct": 2 },
        { "question": "How many times have the Tin Shing Mall been rebuilt?", "options": ["1", "2", "3", "4"], "correct": 0 }
    ];

    const difficulties = [
        { name: "EASY",   circleCount: 20, doubleCount: 5, approachTime: 1300, radius: 40, timingWindow: 1.3 },
        { name: "NORMAL", circleCount: 30, doubleCount: 8, approachTime: 1000, radius: 35, timingWindow: 1.0 },
        { name: "HARD",   circleCount: 40, doubleCount: 12, approachTime: 700, radius: 30, timingWindow: 0.8 },
        { name: "INSANE", circleCount: 50, doubleCount: 18, approachTime: 500, radius: 27, timingWindow: 0.65 }
    ];
    
    const TIMING = { perfect: 45, good: 90, ok: 160 };
    const BASE_SCORE = 250;
    const DOUBLE_SCORE = 400;
    const GAME_DURATION = 30000;
    const DB_NAME = 'osuMusicDB';
    const STORE_NAME = 'musicStore';
    const MUSIC_KEY = 'savedMusic';
    
    // DOUBLE NOTE: second circle shrinks 1.5x slower
    const DOUBLE_SECOND_SCALE = 1.5;
    
    let canvas, ctx;
    let activeCircles = [];
    let activeDoubles = [];
    let score = 0, combo = 0, maxCombo = 0, totalHits = 0, misses = 0;
    let gameActive = false, gameStarted = false;
    let currentDifficulty = 1;
    let gameStartTime = 0;
    let animationId = null;
    let allNotes = [];
    let nextNoteIndex = 0;
    
    // Audio
    let audioContext = null;
    let audioBuffer = null;
    let audioSource = null;
    let musicName = 'No Music';
    let musicFileSize = 0;
    
    let quizActive = true, gameLocked = true;
    let questionBank = [];
    let deathTriggered = false;
    
    const canvasElem = document.getElementById('gameCanvas');
    canvasElem.width = 800;
    canvasElem.height = 500;
    ctx = canvasElem.getContext('2d');
    
    // ============================================
    // INDEXEDDB MUSIC STORAGE
    // ============================================
    
    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME);
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }
    
    function saveMusicToDB(name, data, size) {
        return new Promise(async (resolve, reject) => {
            try {
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                
                const musicData = {
                    name: name,
                    data: data,
                    size: size,
                    savedAt: Date.now()
                };
                
                const request = store.put(musicData, MUSIC_KEY);
                request.onsuccess = () => resolve(true);
                request.onerror = () => reject(request.error);
            } catch (e) {
                reject(e);
            }
        });
    }
    
    function loadMusicFromDB() {
        return new Promise(async (resolve, reject) => {
            try {
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(MUSIC_KEY);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            } catch (e) {
                reject(e);
            }
        });
    }
    
    function clearMusicFromDB() {
        return new Promise(async (resolve, reject) => {
            try {
                const db = await openDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(MUSIC_KEY);
                request.onsuccess = () => resolve(true);
                request.onerror = () => reject(request.error);
            } catch (e) {
                reject(e);
            }
        });
    }
    
    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
        return (bytes / 1073741824).toFixed(1) + ' GB';
    }
    
    // ============================================
    // AUDIO
    // ============================================
    function initAudio() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioContext;
    }
    
    async function loadMusicFile(file) {
        const statusEl = document.getElementById('musicStatus');
        statusEl.className = 'music-status loading';
        statusEl.innerHTML = '⏳ LOADING...';
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            const ctx = initAudio();
            audioBuffer = await ctx.decodeAudioData(arrayBuffer);
            
            const dataArray = new Uint8Array(arrayBuffer);
            await saveMusicToDB(file.name, dataArray, arrayBuffer.byteLength);
            
            musicName = file.name;
            musicFileSize = arrayBuffer.byteLength;
            
            document.getElementById('fileSizeDisplay').innerHTML = formatFileSize(musicFileSize);
            statusEl.className = 'music-status';
            statusEl.innerHTML = '💾 ' + musicName;
            document.getElementById('gameStatus').innerHTML = 'MUSIC SAVED';
            
            console.log('🎵 Music saved to IndexedDB:', musicName, formatFileSize(musicFileSize));
        } catch (err) {
            console.error('Error loading music:', err);
            statusEl.className = 'music-status error';
            statusEl.innerHTML = '❌ ERROR';
            document.getElementById('gameStatus').innerHTML = 'ERROR: ' + err.message;
        }
    }
    
    async function loadSavedMusic() {
        const statusEl = document.getElementById('musicStatus');
        statusEl.className = 'music-status loading';
        statusEl.innerHTML = '⏳ LOADING...';
        
        try {
            const stored = await loadMusicFromDB();
            if (!stored) {
                statusEl.className = 'music-status';
                statusEl.innerHTML = 'NO MUSIC';
                return false;
            }
            
            const ctx = initAudio();
            const arrayBuffer = stored.data.buffer;
            audioBuffer = await ctx.decodeAudioData(arrayBuffer);
            musicName = stored.name;
            musicFileSize = stored.size || 0;
            
            document.getElementById('fileSizeDisplay').innerHTML = formatFileSize(musicFileSize);
            statusEl.className = 'music-status';
            statusEl.innerHTML = '💾 ' + musicName;
            document.getElementById('gameStatus').innerHTML = 'MUSIC LOADED FROM STORAGE';
            
            console.log('🎵 Music loaded from IndexedDB:', musicName, formatFileSize(musicFileSize));
            return true;
        } catch (err) {
            console.error('Error loading saved music:', err);
            statusEl.className = 'music-status error';
            statusEl.innerHTML = '❌ CORRUPT';
            await clearMusicFromDB();
            return false;
        }
    }
    
    async function clearMusic() {
        try {
            await clearMusicFromDB();
            audioBuffer = null;
            musicName = 'No Music';
            musicFileSize = 0;
            document.getElementById('fileSizeDisplay').innerHTML = '';
            const statusEl = document.getElementById('musicStatus');
            statusEl.className = 'music-status';
            statusEl.innerHTML = 'NO MUSIC';
            document.getElementById('gameStatus').innerHTML = 'MUSIC CLEARED';
            console.log('🗑 Music cleared from IndexedDB');
        } catch (e) {
            console.error('Error clearing music:', e);
        }
    }
    
    function playMusic() {
        if (!audioBuffer) {
            document.getElementById('gameStatus').innerHTML = '⚠️ NO MUSIC';
            return;
        }
        try {
            const ctx = initAudio();
            if (audioSource) {
                try { audioSource.stop(); audioSource.disconnect(); } catch(e) {}
            }
            audioSource = ctx.createBufferSource();
            audioSource.buffer = audioBuffer;
            audioSource.connect(ctx.destination);
            audioSource.start(0);
            const statusEl = document.getElementById('musicStatus');
            statusEl.className = 'music-status';
            statusEl.innerHTML = '▶ ' + musicName;
        } catch (err) {
            console.error('Error playing music:', err);
        }
    }
    
    function stopMusic() {
        if (audioSource) {
            try { audioSource.stop(); audioSource.disconnect(); } catch(e) {}
            audioSource = null;
        }
        if (musicName !== 'No Music') {
            const statusEl = document.getElementById('musicStatus');
            statusEl.className = 'music-status';
            statusEl.innerHTML = '⏸ ' + musicName;
        }
    }
    
    // ============================================
    // DIFFICULTY GENERATOR
    // ============================================
    function generateNotes() {
        const diff = difficulties[currentDifficulty];
        const notes = [];
        const startOffset = 1500;
        const endTime = GAME_DURATION;
        
        // Generate single circles
        for (let i = 0; i < diff.circleCount; i++) {
            let t = startOffset + (i / diff.circleCount) * (endTime - startOffset - 500);
            t += (Math.random() - 0.5) * 40;
            
            const margin = 70;
            const x = margin + Math.random() * (canvasElem.width - margin * 2);
            const y = margin + Math.random() * (canvasElem.height - margin * 2);
            
            notes.push({
                type: 'circle',
                time: t,
                x: x,
                y: y,
                radius: diff.radius,
                approachTime: diff.approachTime,
                hit: false,
                id: Math.random()
            });
        }
        
        // Generate double notes
        for (let i = 0; i < diff.doubleCount; i++) {
            let t = startOffset + 800 + (i / diff.doubleCount) * (endTime - startOffset - 1000);
            t += (Math.random() - 0.5) * 50;
            
            const margin = 70;
            const centerX = margin + Math.random() * (canvasElem.width - margin * 2);
            const centerY = margin + Math.random() * (canvasElem.height - margin * 2);
            
            const offset = diff.radius * 1.8;
            const angle = Math.random() * Math.PI * 2;
            
            let x1 = centerX + Math.cos(angle) * offset;
            let y1 = centerY + Math.sin(angle) * offset;
            let x2 = centerX + Math.cos(angle + Math.PI) * offset;
            let y2 = centerY + Math.sin(angle + Math.PI) * offset;
            
            const margin2 = 80;
            x1 = Math.min(canvasElem.width - margin2, Math.max(margin2, x1));
            y1 = Math.min(canvasElem.height - margin2, Math.max(margin2, y1));
            x2 = Math.min(canvasElem.width - margin2, Math.max(margin2, x2));
            y2 = Math.min(canvasElem.height - margin2, Math.max(margin2, y2));
            
            notes.push({
                type: 'double',
                time: t,
                x1: x1,
                y1: y1,
                x2: x2,
                y2: y2,
                radius: diff.radius - 2,
                approachTime: diff.approachTime,
                approachTime2: diff.approachTime * DOUBLE_SECOND_SCALE,
                hit: false,
                tapped: 0,
                // Track timing for judgement
                tap1Time: 0,
                tap2Time: 0,
                id: Math.random()
            });
        }
        
        // Sort by time
        notes.sort((a, b) => a.time - b.time);
        return notes;
    }
    
    // ============================================
    // GAME PLAY
    // ============================================
    function startGame() {
        if (!audioBuffer) {
            document.getElementById('gameStatus').innerHTML = '⚠️ UPLOAD MUSIC FIRST';
            return;
        }
        
        stopMusic();
        
        allNotes = generateNotes();
        allNotes.sort((a,b) => a.time - b.time);
        
        if (allNotes.length === 0) {
            document.getElementById('gameStatus').innerHTML = 'ERROR: No notes generated';
            return;
        }
        
        console.log('Generated ' + allNotes.length + ' notes');
        
        gameStarted = true;
        gameActive = true;
        deathTriggered = false;
        nextNoteIndex = 0;
        activeCircles = [];
        activeDoubles = [];
        score = 0; combo = 0; maxCombo = 0; totalHits = 0; misses = 0;
        gameStartTime = performance.now();
        updateUI();
        document.getElementById('gameStatus').innerHTML = 'PLAYING...';
        document.getElementById('playBtn').style.background = '#ff3366';
        
        playMusic();
        
        if (animationId) cancelAnimationFrame(animationId);
        function update() {
            if (!gameStarted) { draw(); animationId = requestAnimationFrame(update); return; }
            
            const now = performance.now();
            const elapsed = now - gameStartTime;
            
            if (gameActive && !deathTriggered) {
                // Spawn notes
                while (nextNoteIndex < allNotes.length && elapsed >= allNotes[nextNoteIndex].time - allNotes[nextNoteIndex].approachTime) {
                    const note = allNotes[nextNoteIndex];
                    if (note.type === 'circle') {
                        activeCircles.push({...note});
                    } else if (note.type === 'double') {
                        activeDoubles.push({...note});
                    }
                    nextNoteIndex++;
                }
                
                const timingOk = TIMING.ok * difficulties[currentDifficulty].timingWindow;
                
                // Check single circle misses
                for (let i = 0; i < activeCircles.length; i++) {
                    const note = activeCircles[i];
                    if (!note.hit && elapsed > note.time + timingOk + 50) {
                        note.hit = true;
                        combo = 0;
                        misses++;
                        updateUI();
                    }
                }
                activeCircles = activeCircles.filter(n => !n.hit);
                
                // Check double note misses
                for (let i = 0; i < activeDoubles.length; i++) {
                    const note = activeDoubles[i];
                    if (note.hit) continue;
                    
                    // If first circle is tapped, use slower miss time for second circle
                    const missTime = note.tapped >= 1 ? 
                        note.time + note.approachTime2 + 50 : 
                        note.time + timingOk + 50;
                    
                    if (elapsed > missTime) {
                        note.hit = true;
                        combo = 0;
                        misses++;
                        updateUI();
                    }
                }
                activeDoubles = activeDoubles.filter(n => !n.hit);
                
                if (nextNoteIndex >= allNotes.length && activeCircles.length === 0 && activeDoubles.length === 0) {
                    gameActive = false;
                    document.getElementById('gameStatus').innerHTML = '🎉 FINISHED!';
                    document.getElementById('playBtn').style.background = '#66cc88';
                    stopMusic();
                }
            }
            
            draw();
            animationId = requestAnimationFrame(update);
        }
        update();
    }
    
    // ============================================
    // DRAW FUNCTIONS
    // ============================================
    function draw() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        ctx.fillStyle = '#11161f';
        ctx.fillRect(0, 0, canvasElem.width, canvasElem.height);
        
        const now = performance.now();
        const elapsed = now - gameStartTime;
        
        // Draw double notes
        for (const d of activeDoubles) {
            const timeToHit = d.time - elapsed;
            const alpha = Math.min(1, Math.max(0.3, 1 - (d.approachTime - timeToHit) / d.approachTime * 0.5));
            
            // Connecting line
            ctx.beginPath();
            ctx.moveTo(d.x1, d.y1);
            ctx.lineTo(d.x2, d.y2);
            ctx.strokeStyle = `rgba(200, 120, 180, ${alpha * 0.5})`;
            ctx.lineWidth = 3;
            ctx.setLineDash([6, 6]);
            ctx.stroke();
            ctx.setLineDash([]);
            
            const isTapped1 = d.tapped >= 1;
            
            // Circle 1 - normal speed (approachTime)
            const progress1 = Math.min(1, Math.max(0, 1 - timeToHit / d.approachTime));
            const scale1 = 1.8 - progress1 * 0.8;
            
            ctx.beginPath();
            ctx.arc(d.x1, d.y1, d.radius * scale1, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 220, ${isTapped1 ? 0.3 : alpha})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(d.x1, d.y1, d.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = isTapped1 ? `rgba(100, 200, 100, ${alpha})` : `rgba(255, 100, 160, ${alpha})`;
            ctx.fill();
            
            // Circle 2 - SLOWER speed (approachTime2 = 1.5x slower)
            const isTapped2 = d.tapped >= 2;
            const progress2 = Math.min(1, Math.max(0, 1 - timeToHit / d.approachTime2));
            const scale2 = 1.8 - progress2 * 0.8;
            
            ctx.beginPath();
            ctx.arc(d.x2, d.y2, d.radius * scale2, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 220, ${isTapped2 ? 0.3 : alpha})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(d.x2, d.y2, d.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = isTapped2 ? `rgba(100, 200, 100, ${alpha})` : `rgba(100, 150, 200, ${alpha})`;
            ctx.fill();
            
            // Labels
            ctx.fillStyle = `rgba(255,255,255,${alpha})`;
            ctx.font = `bold ${d.radius - 4}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            if (!isTapped1) ctx.fillText("1", d.x1, d.y1 + 1);
            if (!isTapped2) ctx.fillText("2", d.x2, d.y2 + 1);
        }
        
        // Draw single circles
        for (const c of activeCircles) {
            const timeToHit = c.time - elapsed;
            let scale = 1.0;
            if (timeToHit > 0) {
                const progress = Math.min(1, Math.max(0, 1 - timeToHit / c.approachTime));
                scale = 1.8 - progress * 0.8;
            }
            
            const radius = c.radius * scale;
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 180, 220, ${Math.min(1, 1 - timeToHit / c.approachTime)})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = "#ff66aa";
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 8, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
        }
        
        // Combo display
        if (combo >= 5 && gameStarted && gameActive && !deathTriggered) {
            ctx.font = `bold 32px "Courier New"`;
            ctx.fillStyle = "#ffcc66";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff66aa";
            ctx.textAlign = "left";
            ctx.fillText(`${combo}x`, canvasElem.width - 85, 65);
            ctx.shadowBlur = 0;
        }
        
        // Progress bar
        const prog = Math.min(1, Math.max(0, elapsed / GAME_DURATION));
        ctx.fillStyle = "#ff66aa30";
        ctx.fillRect(20, canvasElem.height - 20, canvasElem.width - 40, 6);
        ctx.fillStyle = "#ff66aa";
        ctx.fillRect(20, canvasElem.height - 20, (canvasElem.width - 40) * prog, 6);
        
        ctx.fillStyle = "#aab3cf";
        ctx.font = "14px monospace";
        ctx.textAlign = "left";
        ctx.fillText(`SCORE: ${Math.floor(score)}`, 20, 30);
    }
    
    function getCanvasCoords(clientX, clientY) {
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }
    
    // ============================================
    // JUDGEMENT HELPER
    // ============================================
    function getJudgement(timeDiff, scale) {
        const perfect = TIMING.perfect * scale;
        const good = TIMING.good * scale;
        const ok = TIMING.ok * scale;
        
        if (timeDiff <= perfect) {
            return { points: BASE_SCORE, judgement: "PERFECT", color: "#ffd700" };
        } else if (timeDiff <= good) {
            return { points: Math.floor(BASE_SCORE * 0.85), judgement: "GOOD", color: "#88ff88" };
        } else if (timeDiff <= ok) {
            return { points: Math.floor(BASE_SCORE * 0.6), judgement: "OK", color: "#88aaff" };
        } else {
            return { points: Math.floor(BASE_SCORE * 0.3), judgement: "HIT", color: "#ffaa88" };
        }
    }
    
    // ============================================
    // GAME TAP HANDLER
    // ============================================
    function handleTap(clientX, clientY) {
        if (!gameActive || gameLocked || quizActive || !gameStarted || deathTriggered) return;
        
        const {x, y} = getCanvasCoords(clientX, clientY);
        const elapsed = performance.now() - gameStartTime;
        
        // Check single circles
        for (let i = 0; i < activeCircles.length; i++) {
            const c = activeCircles[i];
            const dx = c.x - x;
            const dy = c.y - y;
            if (Math.hypot(dx, dy) <= c.radius * 1.5) {
                const timeDiff = Math.abs(elapsed - c.time);
                const scale = difficulties[currentDifficulty].timingWindow;
                const result = getJudgement(timeDiff, scale);
                
                score += result.points + Math.floor(combo * 3);
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                totalHits++;
                c.hit = true;
                updateUI();
                showMessage(result.judgement, clientX, clientY, result.color);
                return;
            }
        }
        
        // Check double notes
        for (let i = 0; i < activeDoubles.length; i++) {
            const d = activeDoubles[i];
            if (d.hit) continue;
            
            const timeDiff = Math.abs(elapsed - d.time);
            const scale = difficulties[currentDifficulty].timingWindow;
            if (timeDiff > TIMING.ok * scale) continue;
            
            const dx1 = d.x1 - x;
            const dy1 = d.y1 - y;
            const dist1 = Math.hypot(dx1, dy1);
            
            const dx2 = d.x2 - x;
            const dy2 = d.y2 - y;
            const dist2 = Math.hypot(dx2, dy2);
            
            const tappedCircle1 = dist1 <= d.radius * 1.5;
            const tappedCircle2 = dist2 <= d.radius * 1.5;
            
            // Tap circle 1 (first tap)
            if (tappedCircle1 && d.tapped === 0) {
                d.tapped = 1;
                d.tap1Time = timeDiff;
                const result = getJudgement(timeDiff, scale);
                showMessage(result.judgement, clientX, clientY, result.color);
                return;
            }
            
            // Tap circle 2 (second tap - COMPLETE the double)
            if (tappedCircle2 && d.tapped === 1) {
                d.tapped = 2;
                d.tap2Time = timeDiff;
                d.hit = true;
                
                // Average the two tap times for overall judgement
                const avgTimeDiff = (d.tap1Time + timeDiff) / 2;
                const result = getJudgement(avgTimeDiff, scale);
                
                // Bonus points for double
                const bonusPoints = DOUBLE_SCORE + Math.floor(combo * 4);
                score += bonusPoints + result.points;
                combo += 2;
                if (combo > maxCombo) maxCombo = combo;
                totalHits += 2;
                updateUI();
                showMessage("DOUBLE " + result.judgement, clientX, clientY, result.color);
                
                const index = activeDoubles.findIndex(dn => dn.id === d.id);
                if (index !== -1) activeDoubles.splice(index, 1);
                return;
            }
        }
        
        // Miss
        combo = 0;
        misses++;
        updateUI();
        showMessage("MISS", clientX, clientY, "#ff6666");
    }
    
    function showMessage(text, x, y, color) {
        const div = document.createElement('div');
        div.className = 'floating-judgement';
        div.textContent = text;
        div.style.left = (x - 40) + 'px';
        div.style.top = (y - 40) + 'px';
        div.style.color = color;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 700);
    }
    
    function updateAccuracy() {
        let acc = totalHits + misses === 0 ? 100 : (totalHits / (totalHits + misses)) * 100;
        document.getElementById('accuracyWarning').innerHTML = 'ACC: ' + acc.toFixed(1) + '%';
        
        if (acc < 60 && gameActive && gameStarted && totalHits + misses > 10 && !deathTriggered) {
            gameActive = false;
            gameStarted = false;
            showDeathScreen();
        }
        return acc;
    }
    
    function showDeathScreen() {
        if (deathTriggered) return;
        deathTriggered = true;
        
        const overlay = document.createElement('div');
        overlay.className = 'death-overlay';
        overlay.innerHTML = `
            <div class="death-container">
                <div class="death-title">GAME OVER</div>
                <div class="death-subtitle">accuracy below 60%</div>
                <button class="death-reload" id="deathReloadBtn">RETRY</button>
            </div>
        `;
        document.body.appendChild(overlay);
        document.getElementById('deathReloadBtn').onclick = () => location.reload();
        setTimeout(() => location.reload(), 3000);
    }
    
    function updateUI() {
        document.getElementById('scoreDisplay').innerHTML = 'SCORE: ' + Math.floor(score);
        document.getElementById('comboDisplay').innerHTML = 'COMBO: ' + combo;
        updateAccuracy();
    }
    
    // ============================================
    // DIFFICULTY BUTTON HANDLING
    // ============================================
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            const newDiff = parseInt(btn.dataset.diff);
            if (!isNaN(newDiff) && newDiff !== currentDifficulty) {
                currentDifficulty = newDiff;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('difficultyIndicator').innerHTML = difficulties[currentDifficulty].name;
                document.getElementById('gameStatus').innerHTML = 'DIFFICULTY CHANGED';
            }
        };
    });
    
    // ============================================
    // EVENTS
    // ============================================
    
    canvasElem.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        if (touch) handleTap(touch.clientX, touch.clientY);
    }, { passive: false });
    
    canvasElem.addEventListener('mousedown', (e) => {
        e.preventDefault();
        handleTap(e.clientX, e.clientY);
    });
    
    document.getElementById('playBtn').onclick = startGame;
    
    document.getElementById('resetBtn').onclick = () => {
        if (animationId) cancelAnimationFrame(animationId);
        stopMusic();
        gameStarted = false;
        gameActive = false;
        activeCircles = [];
        activeDoubles = [];
        score = 0; combo = 0; maxCombo = 0; totalHits = 0; misses = 0;
        document.getElementById('scoreDisplay').innerHTML = 'SCORE: 0';
        document.getElementById('comboDisplay').innerHTML = 'COMBO: 0';
        document.getElementById('gameStatus').innerHTML = 'RESET';
        document.getElementById('playBtn').style.background = '#ff66aa';
        draw();
    };
    
    document.getElementById('clearMusicBtn').onclick = async () => {
        if (confirm('Clear saved music from storage?')) {
            await clearMusic();
        }
    };
    
    document.getElementById('musicFileInput').onchange = (e) => {
        if (e.target.files && e.target.files[0]) {
            const file = e.target.files[0];
            document.getElementById('fileSizeDisplay').innerHTML = formatFileSize(file.size) + ' (uploading...)';
            loadMusicFile(file);
            document.getElementById('gameStatus').innerHTML = 'MUSIC UPLOADED & SAVED';
        }
    };
    
    // ============================================
    // QUIZ SYSTEM
    // ============================================
    function showQuiz() {
        const shuffled = [...questionBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const questions = shuffled.slice(0, 3);
        let qIndex = 0;
        
        const overlay = document.createElement('div');
        overlay.className = 'quiz-overlay';
        
        function showQuestion() {
            if (qIndex >= questions.length) {
                overlay.remove();
                quizActive = false;
                gameLocked = false;
                document.getElementById('gameStatus').innerHTML = 'READY - UPLOAD MUSIC & PLAY';
                return;
            }
            const q = questions[qIndex];
            overlay.innerHTML = `
                <div class="quiz-container">
                    <div class="progress-badge">QUESTION ${qIndex+1}/3</div>
                    <div class="progress-badge" style="color:#88ff88">INFINITE ATTEMPTS</div>
                    <div class="quiz-question">${q.question}</div>
                    <div class="quiz-options">
                        ${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${opt}</div>`).join('')}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.quiz-opt').forEach(btn => {
                btn.onclick = () => {
                    if (parseInt(btn.dataset.opt) === q.correct) {
                        qIndex++;
                        showQuestion();
                    } else {
                        const msg = document.createElement('div');
                        msg.style.cssText = 'color:#ff8888;text-align:center;margin-top:15px';
                        msg.innerText = "WRONG - TRY AGAIN";
                        overlay.querySelector('.quiz-container').appendChild(msg);
                        setTimeout(() => msg.remove(), 1200);
                    }
                };
            });
        }
        
        document.body.appendChild(overlay);
        showQuestion();
    }
    
    // ============================================
    // INIT
    // ============================================
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error('questions.json not found');
            const data = await response.json();
            questionBank = data.questions || data;
        } catch (error) {
            questionBank = DEFAULT_QUESTIONS;
        }
    }
    
    document.getElementById('gameStatus').innerHTML = 'Loading...';
    
    loadSavedMusic();
    
    loadQuestions().then(() => {
        document.getElementById('gameStatus').innerHTML = 'Answer 3 questions';
        showQuiz();
    });
</script>
