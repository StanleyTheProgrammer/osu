<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>osu! Style · TRUE Difficulty · Insane Mode</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: linear-gradient(135deg, #1e1b2e, #141121);
            border-radius: 48px;
            padding: 30px 25px;
            max-width: 550px;
            width: 90%;
            border: 2px solid #ff88cc;
            box-shadow: 0 0 40px rgba(255, 136, 204, 0.3);
            animation: floatIn 0.3s ease;
        }

        @keyframes floatIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .quiz-question {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 25px;
            text-align: center;
            word-wrap: break-word;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .quiz-opt {
            background: #2a2342;
            border: 2px solid #5a4a8a;
            padding: 14px 20px;
            border-radius: 60px;
            color: #f0e6ff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-size: 1rem;
        }

        .quiz-opt:active {
            background: #ff66aa;
            transform: scale(0.98);
        }

        .progress-badge {
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ffaa88;
            font-weight: bold;
        }

        .lives-display {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff6699;
            pointer-events: none;
        }

        .accuracy-warning {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            color: #ffaa44;
            pointer-events: none;
        }

        .difficulty-indicator {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff88cc;
            color: #ff88cc;
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .game-container {
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            cursor: pointer;
            background: #11161f;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 15px 15px 10px 15px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 60px;
        }

        .stat {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .stat span:first-child {
            color: #aab3cf;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-right: 6px;
        }

        .stat span:last-child {
            color: #f3e9c0;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .difficulty-bar {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: #1e2438;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 5px 14px;
            border-radius: 40px;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .diff-btn.active {
            background: #ff66aa;
            color: white;
            box-shadow: 0 0 12px #ff66aa80;
        }

        .diff-btn:active {
            transform: scale(0.95);
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        button {
            background: #292f42;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 60px;
            color: #eff3ff;
            cursor: pointer;
            transition: 0.15s linear;
        }

        button:active {
            transform: translateY(2px);
        }

        .result-message {
            text-align: center;
            margin-top: 12px;
            font-weight: 700;
            background: #00000066;
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            font-size: 0.85rem;
        }

        .footer-meta {
            text-align: center;
            font-size: 0.65rem;
            color: #7f8aa8;
            margin-top: 12px;
        }

        .floating-judgement {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 200;
            animation: floatUp 0.8s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.8);
            }
            50% {
                opacity: 1;
                transform: translateY(-40px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0.9);
            }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .stat span:last-child { font-size: 1.1rem; }
            .diff-btn { font-size: 0.75rem; padding: 4px 10px; }
            .quiz-question { font-size: 1.2rem; }
            .quiz-opt { padding: 12px 16px; font-size: 0.9rem; }
            .floating-judgement { font-size: 1.5rem; }
            .difficulty-indicator { font-size: 0.75rem; top: 60px; }
        }
    </style>
</head>
<body>
<div class="lives-display" id="livesDisplay">❤️ LIVES: 2</div>
<div class="accuracy-warning" id="accuracyWarning">📊 ACC: 100%</div>
<div class="difficulty-indicator" id="difficultyIndicator">⚔️ NORMAL ⚔️</div>

<div class="game-container">
    <canvas id="gameCanvas" width="800" height="500" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/500"></canvas>
    
    <div class="info-panel">
        <div class="stats">
            <div class="stat"><span>🎯 SCORE</span><span id="scoreValue">0</span></div>
            <div class="stat"><span>💯 ACC</span><span id="accValue">100</span><span style="font-size:0.8rem">%</span></div>
            <div class="stat"><span>⭐ COMBO</span><span id="comboValue">0</span></div>
        </div>
        <div class="difficulty-bar" id="difficultySelector">
            <button class="diff-btn" data-diff="0">🍃 EASY</button>
            <button class="diff-btn" data-diff="1">🔥 NORMAL</button>
            <button class="diff-btn" data-diff="2">💀 HARD</button>
            <button class="diff-btn" data-diff="3">🌋 INSANE</button>
        </div>
    </div>

    <div class="action-area">
        <button id="resetGameBtn">🔄 NEW GAME</button>
        <button id="restartSameBtn">🎵 RESTART</button>
    </div>
    <div style="display: flex; justify-content: center;">
        <div id="gameStatusMsg" class="result-message">✨ Answer 3 questions to start!</div>
    </div>
    <div class="footer-meta">
        🎧 HARD = 2x notes, INSANE = 3x notes + super fast approach • Accuracy only drops on MISS
    </div>
</div>

<script>
    // DRAMATICALLY SCALED DIFFICULTIES
    const difficulties = [
        { 
            name: "EASY",   
            noteCount: 28,      // Slow pace
            approachTime: 1400, // Very slow approach (1.4 seconds)
            radius: 40,         // Bigger circles
            timingWindow: 1.2,  // More forgiving
            color: "#88ff88"
        },
        { 
            name: "NORMAL", 
            noteCount: 45,      // Moderate
            approachTime: 1000, // Normal speed
            radius: 35,
            timingWindow: 1.0,
            color: "#ffaa66"
        },
        { 
            name: "HARD",   
            noteCount: 75,      // 2.6x more notes than Easy!
            approachTime: 650,  // Fast approach (0.65 seconds)
            radius: 30,         // Smaller circles
            timingWindow: 0.8,  // Less forgiving
            color: "#ff6666"
        },
        { 
            name: "INSANE", 
            noteCount: 105,     // 3.75x more notes than Easy! DENSE!
            approachTime: 450,  // EXTREMELY FAST (0.45 seconds to react!)
            radius: 26,         // Tiny circles
            timingWindow: 0.65, // Very strict timing
            color: "#ff44ff"
        }
    ];
    
    // Timing windows scale with difficulty
    const HIT_WINDOW_PERFECT_BASE = 50;
    const HIT_WINDOW_GOOD_BASE = 100;
    const HIT_WINDOW_OK_BASE = 180;
    const BASE_SCORE = 250;
    const GAME_DURATION_MS = 32000;
    
    let canvas, ctx;
    let circles = [];
    let score = 0, combo = 0, maxCombo = 0, totalHits = 0, misses = 0;
    let gameActive = false;
    let currentDifficulty = 1; // Start NORMAL
    let gameStartTimestamp = 0;
    let animationId = null;
    let beatTimestamps = [];
    let pendingNotes = [];
    let nextSpawnIdx = 0;
    let gameStarted = false;
    
    let lives = 2;
    let gamePausedForRespawn = false;
    let respawnOverlay = null;
    let questionBank = [];
    let quizActive = true;
    let gameLocked = true;
    let pendingLifeLoss = false;
    let lifeLossCooldown = false;
    
    const canvasElem = document.getElementById('gameCanvas');
    ctx = canvasElem.getContext('2d');
    
    // Get dynamic timing windows based on difficulty
    function getHitWindows() {
        const diff = difficulties[currentDifficulty];
        const scale = diff.timingWindow;
        return {
            perfect: Math.floor(HIT_WINDOW_PERFECT_BASE * scale),
            good: Math.floor(HIT_WINDOW_GOOD_BASE * scale),
            ok: Math.floor(HIT_WINDOW_OK_BASE * scale)
        };
    }
    
    function showFloatingJudgement(text, x, y, color) {
        const div = document.createElement('div');
        div.className = 'floating-judgement';
        div.textContent = text;
        div.style.left = (x - 50) + 'px';
        div.style.top = (y - 50) + 'px';
        div.style.color = color;
        document.body.appendChild(div);
        
        setTimeout(() => {
            if (div && div.parentNode) div.remove();
        }, 800);
    }
    
    function updateDifficultyIndicator() {
        const diff = difficulties[currentDifficulty];
        document.getElementById('difficultyIndicator').innerHTML = `⚔️ ${diff.name} ⚔️`;
        document.getElementById('difficultyIndicator').style.borderColor = diff.color;
        document.getElementById('difficultyIndicator').style.color = diff.color;
    }
    
    function resizeCanvas() {
        const maxWidth = Math.min(800, window.innerWidth - 40);
        canvasElem.style.width = `${maxWidth}px`;
        canvasElem.style.height = 'auto';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error('Failed to load questions.json');
            const data = await response.json();
            questionBank = data.questions || data;
            return questionBank;
        } catch (error) {
            questionBank = [
                { question: "What is the capital of France?", options: ["London", "Berlin", "Paris", "Madrid"], correct: 2 },
                { question: "Which planet is known as the Red Planet?", options: ["Mars", "Jupiter", "Venus", "Saturn"], correct: 0 },
                { question: "What is 2 + 2?", options: ["3", "4", "5", "6"], correct: 1 },
                { question: "Who painted the Mona Lisa?", options: ["Van Gogh", "Picasso", "Da Vinci", "Rembrandt"], correct: 2 },
                { question: "What is the largest ocean?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 }
            ];
            return questionBank;
        }
    }
    
    function showInitialQuiz(questions) {
        if (!questions || questions.length === 0) {
            startGameAfterQuiz();
            return;
        }
        
        let currentQIndex = 0;
        const overlay = document.createElement('div');
        overlay.className = 'quiz-overlay';
        
        function updateQuizDisplay() {
            if (currentQIndex >= questions.length) {
                overlay.remove();
                startGameAfterQuiz();
                return;
            }
            
            const q = questions[currentQIndex];
            overlay.innerHTML = `
                <div class="quiz-container">
                    <div class="progress-badge">📚 QUESTION ${currentQIndex + 1}/${questions.length}</div>
                    <div class="progress-badge" style="color:#88ff88">✨ Infinite attempts!</div>
                    <div class="quiz-question">${escapeHtml(q.question)}</div>
                    <div class="quiz-options">
                        ${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${escapeHtml(opt)}</div>`).join('')}
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.quiz-opt').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const selected = parseInt(btn.dataset.opt);
                    if (selected === q.correct) {
                        currentQIndex++;
                        updateQuizDisplay();
                    } else {
                        const msg = document.createElement('div');
                        msg.style.color = '#ff8888';
                        msg.style.textAlign = 'center';
                        msg.style.marginTop = '15px';
                        msg.innerText = '❌ Try again!';
                        overlay.querySelector('.quiz-container').appendChild(msg);
                        setTimeout(() => msg.remove(), 1200);
                    }
                });
            });
        }
        
        document.body.appendChild(overlay);
        updateQuizDisplay();
    }
    
    function showRespawnQuiz(onComplete) {
        if (!questionBank || questionBank.length === 0) {
            onComplete(false);
            return;
        }
        
        if (respawnOverlay && respawnOverlay.parentNode) {
            respawnOverlay.remove();
        }
        
        const randomIndex = Math.floor(Math.random() * questionBank.length);
        const q = questionBank[randomIndex];
        
        respawnOverlay = document.createElement('div');
        respawnOverlay.className = 'quiz-overlay';
        
        respawnOverlay.innerHTML = `
            <div class="quiz-container">
                <div class="progress-badge" style="color:#ffaa66">⚠️ RESPAWN CHANCE ⚠️</div>
                <div class="progress-badge">Answer correctly to revive! (1 life)</div>
                <div class="progress-badge" style="color:#ff8888">Only ONE chance!</div>
                <div class="quiz-question">${escapeHtml(q.question)}</div>
                <div class="quiz-options">
                    ${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${escapeHtml(opt)}</div>`).join('')}
                </div>
            </div>
        `;
        
        document.body.appendChild(respawnOverlay);
        
        const options = respawnOverlay.querySelectorAll('.quiz-opt');
        options.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const selected = parseInt(btn.dataset.opt);
                if (respawnOverlay && respawnOverlay.parentNode) {
                    respawnOverlay.remove();
                    respawnOverlay = null;
                }
                onComplete(selected === q.correct);
            });
        });
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function startGameAfterQuiz() {
        quizActive = false;
        gameLocked = false;
        gameActive = false;
        
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.style.pointerEvents = 'auto';
            btn.style.opacity = '1';
        });
        
        document.getElementById('gameStatusMsg').innerHTML = '🎮 Get ready!';
        
        setTimeout(() => startCountdown(), 500);
    }
    
    function startCountdown() {
        let countdown = 3;
        const countdownInterval = setInterval(() => {
            if (countdown > 0) {
                document.getElementById('gameStatusMsg').innerHTML = `🎯 ${countdown}...`;
                countdown--;
            } else {
                clearInterval(countdownInterval);
                document.getElementById('gameStatusMsg').innerHTML = '🎵 GO! Click circles ANYTIME!';
                gameStarted = true;
                gameActive = true;
                pendingLifeLoss = false;
                lifeLossCooldown = false;
                fullReset();
            }
        }, 1000);
    }
    
    function calculateAndUpdateAccuracy() {
        let accuracy;
        if (totalHits + misses === 0) {
            accuracy = 100;
        } else {
            accuracy = (totalHits / (totalHits + misses)) * 100;
        }
        
        document.getElementById('accuracyWarning').innerHTML = `📊 ACC: ${accuracy.toFixed(1)}%`;
        document.getElementById('accValue').innerText = accuracy.toFixed(1);
        
        return accuracy;
    }
    
    function checkAccuracyAndLives() {
        if (!gameActive || gameLocked || gamePausedForRespawn || !gameStarted) return;
        if (pendingLifeLoss || lifeLossCooldown) return;
        if (totalHits + misses < 15) return;
        
        const accuracy = calculateAndUpdateAccuracy();
        
        if (accuracy < 50 && lives > 0) {
            pendingLifeLoss = true;
            
            lives--;
            updateLivesDisplay();
            document.getElementById('gameStatusMsg').innerHTML = `⚠️ Accuracy below 50%! Lost 1 life (${lives} left)`;
            showFloatingJudgement("LOST LIFE", canvasElem.width/2, canvasElem.height/2, "#ff6666");
            
            if (lives >= 0) {
                gameActive = false;
                gamePausedForRespawn = true;
                
                showRespawnQuiz((success) => {
                    gamePausedForRespawn = false;
                    
                    if (success) {
                        lives++;
                        updateLivesDisplay();
                        gameActive = true;
                        pendingLifeLoss = false;
                        lifeLossCooldown = true;
                        setTimeout(() => {
                            lifeLossCooldown = false;
                        }, 5000);
                        document.getElementById('gameStatusMsg').innerHTML = '✨ Revived! +1 life!';
                        showFloatingJudgement("REVIVED!", canvasElem.width/2, canvasElem.height/2, "#88ff88");
                        setTimeout(() => {
                            if(gameActive && gameStarted) document.getElementById('gameStatusMsg').innerHTML = '🎧 Keep tapping!';
                        }, 2000);
                    } else {
                        gameActive = false;
                        gameLocked = true;
                        gameStarted = false;
                        document.getElementById('gameStatusMsg').innerHTML = '💀 GAME OVER - Failed to revive! 💀';
                        document.getElementById('livesDisplay').innerHTML = `❤️ LIVES: 0`;
                        showFloatingJudgement("GAME OVER", canvasElem.width/2, canvasElem.height/2, "#ff4444");
                    }
                });
            } else {
                gameActive = false;
                gameLocked = true;
                gameStarted = false;
                document.getElementById('gameStatusMsg').innerHTML = '💀 GAME OVER - No lives remaining! 💀';
            }
        }
    }
    
    function updateLivesDisplay() {
        document.getElementById('livesDisplay').innerHTML = `❤️ LIVES: ${lives}`;
        if (lives <= 0) {
            document.getElementById('livesDisplay').style.borderColor = '#ff0000';
            document.getElementById('livesDisplay').style.color = '#ff6666';
        } else {
            document.getElementById('livesDisplay').style.borderColor = '#ff6699';
            document.getElementById('livesDisplay').style.color = 'white';
        }
    }
    
    function generateBeatmap(diffIndex) {
        const cfg = difficulties[diffIndex];
        const totalNotes = cfg.noteCount;
        const startOffset = 1500;
        const endMargin = 800;
        const tStart = startOffset;
        const tEnd = GAME_DURATION_MS - endMargin;
        const timestamps = [];
        
        // For harder difficulties, notes are more concentrated (less breathing room)
        for(let i = 0; i < totalNotes; i++) {
            let t;
            if (diffIndex <= 1) {
                // Easy/Normal: gradual increase
                if (i < totalNotes * 0.3) {
                    t = tStart + (i / (totalNotes * 0.3)) * (tEnd * 0.25);
                } else {
                    t = tStart + (tEnd * 0.25) + ((i - totalNotes * 0.3) / (totalNotes * 0.7)) * (tEnd * 0.75);
                }
            } else {
                // Hard/Insane: more aggressive, constant pressure
                t = tStart + (i / totalNotes) * tEnd;
            }
            
            // Add less randomness for harder difficulties (more precise)
            const randomFactor = diffIndex <= 1 ? 35 : 20;
            t += (Math.random() - 0.5) * randomFactor;
            timestamps.push(Math.min(tEnd, Math.max(tStart, t)));
        }
        timestamps.sort((a,b)=>a-b);
        return timestamps;
    }
    
    function randomHitPosition(radius) {
        const margin = 70;
        const maxX = canvasElem.width - margin - radius;
        const minX = margin + radius;
        const maxY = canvasElem.height - margin - radius * 1.5;
        const minY = margin + radius * 1.5;
        return {
            x: Math.floor(Math.random() * (maxX - minX + 1) + minX),
            y: Math.floor(Math.random() * (maxY - minY + 1) + minY)
        };
    }
    
    function fullReset() {
        if(animationId) cancelAnimationFrame(animationId);
        
        circles = [];
        score = 0;
        combo = 0;
        maxCombo = 0;
        totalHits = 0;
        misses = 0;
        updateUIStats();
        calculateAndUpdateAccuracy();
        
        beatTimestamps = generateBeatmap(currentDifficulty);
        const cfg = difficulties[currentDifficulty];
        
        pendingNotes = beatTimestamps.map((timestamp, idx) => {
            const pos = randomHitPosition(cfg.radius);
            return {
                timeMs: timestamp,
                id: idx,
                x: pos.x,
                y: pos.y,
                radius: cfg.radius,
                generated: false,
                hit: false,
                approachTime: cfg.approachTime
            };
        });
        
        nextSpawnIdx = 0;
        gameStartTimestamp = performance.now();
        
        function gameUpdate() {
            if(!gameStarted) {
                drawCanvas(0);
                animationId = requestAnimationFrame(gameUpdate);
                return;
            }
            
            if((!gameActive || gamePausedForRespawn)) {
                drawCanvas(performance.now() - gameStartTimestamp);
                animationId = requestAnimationFrame(gameUpdate);
                return;
            }
            
            const now = performance.now();
            const elapsed = now - gameStartTimestamp;
            
            if(gameActive && !gamePausedForRespawn && gameStarted) {
                if(pendingNotes && nextSpawnIdx < pendingNotes.length) {
                    while(nextSpawnIdx < pendingNotes.length) {
                        const note = pendingNotes[nextSpawnIdx];
                        const spawnTime = note.timeMs - note.approachTime;
                        if(elapsed >= spawnTime) {
                            if(!note.generated && !note.hit) {
                                note.generated = true;
                                circles.push({
                                    id: note.id,
                                    x: note.x,
                                    y: note.y,
                                    radius: note.radius,
                                    targetTime: note.timeMs,
                                    hit: false,
                                    approachTime: note.approachTime
                                });
                            }
                            nextSpawnIdx++;
                        } else {
                            break;
                        }
                    }
                }
                
                const windows = getHitWindows();
                for(let i=0; i<circles.length; i++) {
                    const c = circles[i];
                    if(!c.hit) {
                        const missDelta = elapsed - c.targetTime;
                        if(missDelta > windows.ok + 100) {
                            c.hit = true;
                            combo = 0;
                            misses++;
                            updateUIStats();
                            calculateAndUpdateAccuracy();
                            checkAccuracyAndLives();
                        }
                    }
                }
                circles = circles.filter(c => {
                    if(c.hit) return false;
                    const nowMs = elapsed;
                    const windows = getHitWindows();
                    if(nowMs - c.targetTime > windows.ok + 120) return false;
                    return true;
                });
            }
            
            const allNotesProcessed = pendingNotes && nextSpawnIdx >= pendingNotes.length && circles.length === 0;
            if(allNotesProcessed && gameActive && !gamePausedForRespawn && elapsed > GAME_DURATION_MS + 500) {
                finishGame();
            } else if(elapsed > GAME_DURATION_MS + 1500 && gameActive && !gamePausedForRespawn) {
                finishGame();
            }
            
            drawCanvas(elapsed);
            animationId = requestAnimationFrame(gameUpdate);
        }
        
        animationId = requestAnimationFrame(gameUpdate);
        updateUIStats();
        drawCanvas(0);
    }
    
    function finishGame() {
        if(!gameActive) return;
        gameActive = false;
        gameStarted = false;
        const accuracy = calculateAndUpdateAccuracy();
        document.getElementById('gameStatusMsg').innerHTML = `🏆 CLEAR! Score: ${score} | Acc: ${accuracy.toFixed(1)}% | Max Combo: ${maxCombo} 🎉`;
    }
    
    function handleTap(clientX, clientY) {
        if(!gameActive || gameLocked || gamePausedForRespawn || !gameStarted) {
            if(gamePausedForRespawn) document.getElementById('gameStatusMsg').innerHTML = '❌ Answer the question to revive!';
            else if(gameLocked) document.getElementById('gameStatusMsg').innerHTML = '❌ Answer initial questions first!';
            return;
        }
        
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        canvasX = Math.min(canvasElem.width, Math.max(0, canvasX));
        canvasY = Math.min(canvasElem.height, Math.max(0, canvasY));
        
        const elapsedGame = performance.now() - gameStartTimestamp;
        
        let closestCircle = null;
        let minDistance = 80;
        
        for(let i=0; i<circles.length; i++) {
            const c = circles[i];
            if(c.hit) continue;
            const dx = c.x - canvasX;
            const dy = c.y - canvasY;
            const dist = Math.hypot(dx, dy);
            const hitRadius = c.radius * 1.8;
            if(dist <= hitRadius) {
                if(!closestCircle || dist < minDistance) {
                    minDistance = dist;
                    closestCircle = c;
                }
            }
        }
        
        if(closestCircle) {
            const timeDiff = Math.abs(elapsedGame - closestCircle.targetTime);
            const windows = getHitWindows();
            let points, judgement, color;
            
            if (timeDiff <= windows.perfect) {
                points = BASE_SCORE;
                judgement = "PERFECT!";
                color = "#ffd700";
            } else if (timeDiff <= windows.good) {
                points = Math.floor(BASE_SCORE * 0.85);
                judgement = "GOOD!";
                color = "#88ff88";
            } else if (timeDiff <= windows.ok) {
                points = Math.floor(BASE_SCORE * 0.6);
                judgement = "OK";
                color = "#88aaff";
            } else {
                points = Math.floor(BASE_SCORE * 0.3);
                judgement = "HIT";
                color = "#ffaa88";
            }
            
            let finalAdd = points + Math.floor(combo * 3);
            score += finalAdd;
            combo++;
            if(combo > maxCombo) maxCombo = combo;
            totalHits++;
            closestCircle.hit = true;
            
            updateUIStats();
            calculateAndUpdateAccuracy();
            checkAccuracyAndLives();
            
            const screenX = rect.left + (closestCircle.x / scaleX);
            const screenY = rect.top + (closestCircle.y / scaleY);
            showFloatingJudgement(judgement, screenX, screenY, color);
            
            window.lastHitEffect = { x: closestCircle.x, y: closestCircle.y, timer: 8 };
            document.getElementById('gameStatusMsg').innerHTML = judgement;
            setTimeout(()=>{
                if(gameActive && !gamePausedForRespawn && gameStarted) document.getElementById('gameStatusMsg').innerHTML = `🎧 Keep tapping!`;
            }, 200);
        } else {
            combo = 0;
            misses++;
            updateUIStats();
            calculateAndUpdateAccuracy();
            checkAccuracyAndLives();
            
            showFloatingJudgement("MISS", clientX, clientY, "#ff6666");
            document.getElementById('gameStatusMsg').innerHTML = "❌ MISS...";
            setTimeout(()=>{
                if(gameActive && !gamePausedForRespawn && gameStarted) document.getElementById('gameStatusMsg').innerHTML = `🎧 Keep tapping!`;
            }, 200);
        }
        updateUIStats();
    }
    
    function updateUIStats() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        const accuracy = calculateAndUpdateAccuracy();
        document.getElementById('accValue').innerText = accuracy.toFixed(1);
        document.getElementById('comboValue').innerText = combo;
    }
    
    function drawCanvas(nowElapsed = 0) {
        if(!ctx) return;
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        
        const grad = ctx.createLinearGradient(0,0,canvasElem.width,canvasElem.height);
        grad.addColorStop(0, '#141b2b');
        grad.addColorStop(1, '#0e1322');
        ctx.fillStyle = grad;
        ctx.fillRect(0,0,canvasElem.width,canvasElem.height);
        
        for(let c of circles) {
            const timeUntilHit = c.targetTime - nowElapsed;
            let approachScale;
            
            if (timeUntilHit > 0) {
                const progress = Math.min(1, Math.max(0, 1 - (timeUntilHit / c.approachTime)));
                approachScale = 1.8 - (progress * 0.8);
            } else {
                approachScale = 1.0;
            }
            
            const approachRadius = c.radius * approachScale;
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, approachRadius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 200, 255, ${Math.min(1, 1 - (timeUntilHit / c.approachTime) * 0.5)})`;
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 2, 0, Math.PI * 2);
            ctx.fillStyle = "#fe7fb5";
            ctx.fill();
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff66aa";
            
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.radius - 8, 0, Math.PI * 2);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            
            ctx.font = `bold ${Math.floor(c.radius * 0.6)}px "Segoe UI"`;
            ctx.fillStyle = "#2a1a3a";
            ctx.shadowBlur = 0;
            ctx.fillText("●", c.x - 7, c.y + 6);
        }
        
        if(window.lastHitEffect && window.lastHitEffect.timer > 0) {
            ctx.beginPath();
            ctx.arc(window.lastHitEffect.x, window.lastHitEffect.y, 50, 0, Math.PI*2);
            ctx.fillStyle = "#ffffffcc";
            ctx.fill();
            window.lastHitEffect.timer--;
            if(window.lastHitEffect.timer <=0) window.lastHitEffect = null;
        }
        
        if(combo >= 5 && gameStarted && gameActive) {
            ctx.font = `bold 32px "Montserrat"`;
            ctx.fillStyle = "#ffe6b3";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#ff66aa";
            ctx.fillText(`${combo}x`, canvasElem.width - 85, 70);
            ctx.shadowBlur = 0;
        }
        
        const elapsed = performance.now() - gameStartTimestamp;
        const prog = Math.min(1, Math.max(0, elapsed / GAME_DURATION_MS));
        ctx.fillStyle = "#ff66aa90";
        ctx.fillRect(20, canvasElem.height - 25, (canvasElem.width - 40) * prog, 10);
        ctx.fillStyle = "#ffffff30";
        ctx.fillRect(20, canvasElem.height - 25, canvasElem.width - 40, 10);
        ctx.fillStyle = "#ffaaee";
        ctx.fillRect(20, canvasElem.height - 25, (canvasElem.width - 40) * prog, 10);
    }
    
    function handleTapEvent(e) {
        e.preventDefault();
        let clientX, clientY;
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        handleTap(clientX, clientY);
    }
    
    canvasElem.addEventListener('click', handleTapEvent);
    canvasElem.addEventListener('touchstart', handleTapEvent, { passive: false });
    
    document.getElementById('resetGameBtn').addEventListener('click', () => {
        location.reload();
    });
    
    document.getElementById('restartSameBtn').addEventListener('click', () => {
        location.reload();
    });
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const newDiff = parseInt(btn.getAttribute('data-diff'));
            if(!isNaN(newDiff) && newDiff !== currentDifficulty) {
                currentDifficulty = newDiff;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateDifficultyIndicator();
                
                // If game is already active, restart with new difficulty
                if(gameStarted && !gameLocked && !quizActive) {
                    gameStarted = false;
                    gameActive = false;
                    setTimeout(() => {
                        gameStarted = true;
                        gameActive = true;
                        fullReset();
                    }, 100);
                }
            }
        });
    });
    
    // Set initial active button
    document.querySelectorAll('.diff-btn').forEach(btn => {
        if(parseInt(btn.getAttribute('data-diff')) === currentDifficulty) {
            btn.classList.add('active');
        }
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.6';
    });
    updateDifficultyIndicator();
    
    async function init() {
        const questions = await loadQuestions();
        const shuffled = [...questions];
        for(let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const initialQuestions = shuffled.slice(0, 3);
        showInitialQuiz(initialQuestions);
    }
    
    init();
</script>
