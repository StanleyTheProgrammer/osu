<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>osu! Style · Drag Notes · 60% Accuracy Death</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            touch-action: none;
        }

        .quiz-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .quiz-container {
            background: linear-gradient(135deg, #1e1b2e, #141121);
            border-radius: 48px;
            padding: 30px 25px;
            max-width: 550px;
            width: 90%;
            border: 2px solid #ff88cc;
            box-shadow: 0 0 40px rgba(255, 136, 204, 0.3);
            animation: floatIn 0.3s ease;
        }

        @keyframes floatIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .quiz-question {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 25px;
            text-align: center;
            word-wrap: break-word;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .quiz-opt {
            background: #2a2342;
            border: 2px solid #5a4a8a;
            padding: 14px 20px;
            border-radius: 60px;
            color: #f0e6ff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            font-size: 1rem;
        }

        .quiz-opt:active {
            background: #ff66aa;
            transform: scale(0.98);
        }

        .progress-badge {
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            color: #ffaa88;
            font-weight: bold;
        }

        .lives-display {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff6699;
            pointer-events: none;
        }

        .accuracy-warning {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.8);
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            color: #ffaa44;
            pointer-events: none;
        }

        .difficulty-indicator {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 6px 20px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            z-index: 100;
            backdrop-filter: blur(8px);
            border: 1px solid #ff88cc;
            color: #ff88cc;
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 2px;
        }

        .game-container {
            background: rgba(10, 14, 23, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            cursor: pointer;
            background: #11161f;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin: 15px 15px 10px 15px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.6);
            padding: 6px 16px;
            border-radius: 60px;
        }

        .stat {
            font-weight: 700;
            font-size: 0.9rem;
        }

        .stat span:first-child {
            color: #aab3cf;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-right: 6px;
        }

        .stat span:last-child {
            color: #f3e9c0;
            font-size: 1.3rem;
            font-weight: 800;
        }

        .difficulty-bar {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .diff-btn {
            background: #1e2438;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 5px 14px;
            border-radius: 40px;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .diff-btn.active {
            background: #ff66aa;
            color: white;
            box-shadow: 0 0 12px #ff66aa80;
        }

        .diff-btn:active {
            transform: scale(0.95);
        }

        .action-area {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }

        button {
            background: #292f42;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 20px;
            border-radius: 60px;
            color: #eff3ff;
            cursor: pointer;
            transition: 0.15s linear;
        }

        button:active {
            transform: translateY(2px);
        }

        .result-message {
            text-align: center;
            margin-top: 12px;
            font-weight: 700;
            background: #00000066;
            padding: 5px 12px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            font-size: 0.85rem;
        }

        .footer-meta {
            text-align: center;
            font-size: 0.65rem;
            color: #7f8aa8;
            margin-top: 12px;
        }

        .floating-judgement {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            z-index: 200;
            animation: floatUp 0.8s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.8);
            }
            50% {
                opacity: 1;
                transform: translateY(-40px) scale(1.1);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0.9);
            }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .stat span:last-child { font-size: 1.1rem; }
            .diff-btn { font-size: 0.75rem; padding: 4px 10px; }
            .quiz-question { font-size: 1.2rem; }
            .quiz-opt { padding: 12px 16px; font-size: 0.9rem; }
            .floating-judgement { font-size: 1.5rem; }
            .difficulty-indicator { font-size: 0.75rem; top: 60px; }
        }
    </style>
</head>
<body>
<div class="lives-display" id="livesDisplay">❤️ LIVES: 2</div>
<div class="accuracy-warning" id="accuracyWarning">📊 ACC: 100%</div>
<div class="difficulty-indicator" id="difficultyIndicator">⚔️ NORMAL ⚔️</div>

<div class="game-container">
    <canvas id="gameCanvas" width="800" height="500" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/500"></canvas>
    
    <div class="info-panel">
        <div class="stats">
            <div class="stat"><span>🎯 SCORE</span><span id="scoreValue">0</span></div>
            <div class="stat"><span>💯 ACC</span><span id="accValue">100</span><span style="font-size:0.8rem">%</span></div>
            <div class="stat"><span>⭐ COMBO</span><span id="comboValue">0</span></div>
        </div>
        <div class="difficulty-bar" id="difficultySelector">
            <button class="diff-btn" data-diff="0">🍃 EASY</button>
            <button class="diff-btn" data-diff="1">🔥 NORMAL</button>
            <button class="diff-btn" data-diff="2">💀 HARD</button>
            <button class="diff-btn" data-diff="3">🌋 INSANE</button>
        </div>
    </div>

    <div class="action-area">
        <button id="resetGameBtn">🔄 NEW GAME</button>
        <button id="restartSameBtn">🎵 RESTART</button>
    </div>
    <div style="display: flex; justify-content: center;">
        <div id="gameStatusMsg" class="result-message">✨ Answer 3 questions to start!</div>
    </div>
    <div class="footer-meta">
        🎧 TAP circles • DRAG sliders (follow the path) • Accuracy &lt;60% = INSTANT DEATH!
    </div>
</div>

<script>
    // DRAMATICALLY SCALED DIFFICULTIES
    const difficulties = [
        { 
            name: "EASY",   
            noteCount: 28,
            sliderCount: 5,
            approachTime: 1400,
            radius: 40,
            timingWindow: 1.2,
            color: "#88ff88"
        },
        { 
            name: "NORMAL", 
            noteCount: 40,
            sliderCount: 8,
            approachTime: 1000,
            radius: 35,
            timingWindow: 1.0,
            color: "#ffaa66"
        },
        { 
            name: "HARD",   
            noteCount: 60,
            sliderCount: 12,
            approachTime: 650,
            radius: 30,
            timingWindow: 0.8,
            color: "#ff6666"
        },
        { 
            name: "INSANE", 
            noteCount: 80,
            sliderCount: 18,
            approachTime: 450,
            radius: 26,
            timingWindow: 0.65,
            color: "#ff44ff"
        }
    ];
    
    const HIT_WINDOW_PERFECT_BASE = 50;
    const HIT_WINDOW_GOOD_BASE = 100;
    const HIT_WINDOW_OK_BASE = 180;
    const BASE_SCORE = 250;
    const SLIDER_BASE_SCORE = 150;
    const GAME_DURATION_MS = 35000;
    
    let canvas, ctx;
    let circles = [];
    let sliders = [];
    let activeDrag = null;
    let dragProgress = 0;
    let score = 0, combo = 0, maxCombo = 0, totalHits = 0, misses = 0;
    let gameActive = false;
    let currentDifficulty = 1;
    let gameStartTimestamp = 0;
    let animationId = null;
    let beatTimestamps = [];
    let sliderData = [];
    let nextCircleIdx = 0;
    let nextSliderIdx = 0;
    let gameStarted = false;
    
    let lives = 2;
    let gamePausedForRespawn = false;
    let respawnOverlay = null;
    let questionBank = [];
    let quizActive = true;
    let gameLocked = true;
    let pendingLifeLoss = false;
    let lifeLossCooldown = false;
    let deathTriggered = false;
    
    const canvasElem = document.getElementById('gameCanvas');
    ctx = canvasElem.getContext('2d');
    
    function getHitWindows() {
        const diff = difficulties[currentDifficulty];
        const scale = diff.timingWindow;
        return {
            perfect: Math.floor(HIT_WINDOW_PERFECT_BASE * scale),
            good: Math.floor(HIT_WINDOW_GOOD_BASE * scale),
            ok: Math.floor(HIT_WINDOW_OK_BASE * scale)
        };
    }
    
    function showFloatingJudgement(text, x, y, color) {
        const div = document.createElement('div');
        div.className = 'floating-judgement';
        div.textContent = text;
        div.style.left = (x - 50) + 'px';
        div.style.top = (y - 50) + 'px';
        div.style.color = color;
        document.body.appendChild(div);
        setTimeout(() => { if (div && div.parentNode) div.remove(); }, 800);
    }
    
    function updateDifficultyIndicator() {
        const diff = difficulties[currentDifficulty];
        document.getElementById('difficultyIndicator').innerHTML = `⚔️ ${diff.name} ⚔️`;
        document.getElementById('difficultyIndicator').style.borderColor = diff.color;
        document.getElementById('difficultyIndicator').style.color = diff.color;
    }
    
    function resizeCanvas() {
        const maxWidth = Math.min(800, window.innerWidth - 40);
        canvasElem.style.width = `${maxWidth}px`;
        canvasElem.style.height = 'auto';
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json');
            if (!response.ok) throw new Error('Failed to load questions.json');
            const data = await response.json();
            questionBank = data.questions || data;
            return questionBank;
        } catch (error) {
            questionBank = [
                { question: "What is the capital of France?", options: ["London", "Berlin", "Paris", "Madrid"], correct: 2 },
                { question: "Which planet is known as the Red Planet?", options: ["Mars", "Jupiter", "Venus", "Saturn"], correct: 0 },
                { question: "What is 2 + 2?", options: ["3", "4", "5", "6"], correct: 1 },
                { question: "Who painted the Mona Lisa?", options: ["Van Gogh", "Picasso", "Da Vinci", "Rembrandt"], correct: 2 },
                { question: "What is the largest ocean?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 }
            ];
            return questionBank;
        }
    }
    
    function showInitialQuiz(questions) {
        if (!questions || questions.length === 0) { startGameAfterQuiz(); return; }
        let currentQIndex = 0;
        const overlay = document.createElement('div');
        overlay.className = 'quiz-overlay';
        function updateQuizDisplay() {
            if (currentQIndex >= questions.length) { overlay.remove(); startGameAfterQuiz(); return; }
            const q = questions[currentQIndex];
            overlay.innerHTML = `<div class="quiz-container"><div class="progress-badge">📚 QUESTION ${currentQIndex + 1}/${questions.length}</div><div class="progress-badge" style="color:#88ff88">✨ Infinite attempts!</div><div class="quiz-question">${escapeHtml(q.question)}</div><div class="quiz-options">${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${escapeHtml(opt)}</div>`).join('')}</div></div>`;
            document.querySelectorAll('.quiz-opt').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const selected = parseInt(btn.dataset.opt);
                    if (selected === q.correct) { currentQIndex++; updateQuizDisplay(); }
                    else {
                        const msg = document.createElement('div');
                        msg.style.cssText = 'color:#ff8888;text-align:center;margin-top:15px';
                        msg.innerText = '❌ Try again!';
                        overlay.querySelector('.quiz-container').appendChild(msg);
                        setTimeout(() => msg.remove(), 1200);
                    }
                });
            });
        }
        document.body.appendChild(overlay);
        updateQuizDisplay();
    }
    
    function showRespawnQuiz(onComplete) {
        if (!questionBank || questionBank.length === 0) { onComplete(false); return; }
        if (respawnOverlay && respawnOverlay.parentNode) respawnOverlay.remove();
        const randomIndex = Math.floor(Math.random() * questionBank.length);
        const q = questionBank[randomIndex];
        respawnOverlay = document.createElement('div');
        respawnOverlay.className = 'quiz-overlay';
        respawnOverlay.innerHTML = `<div class="quiz-container"><div class="progress-badge" style="color:#ffaa66">⚠️ RESPAWN CHANCE ⚠️</div><div class="progress-badge">Answer correctly to revive! (1 life)</div><div class="progress-badge" style="color:#ff8888">Only ONE chance!</div><div class="quiz-question">${escapeHtml(q.question)}</div><div class="quiz-options">${q.options.map((opt, idx) => `<div class="quiz-opt" data-opt="${idx}">${escapeHtml(opt)}</div>`).join('')}</div></div>`;
        document.body.appendChild(respawnOverlay);
        const options = respawnOverlay.querySelectorAll('.quiz-opt');
        options.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const selected = parseInt(btn.dataset.opt);
                if (respawnOverlay && respawnOverlay.parentNode) respawnOverlay.remove();
                onComplete(selected === q.correct);
            });
        });
    }
    
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    function startGameAfterQuiz() {
        quizActive = false; gameLocked = false; gameActive = false;
        document.querySelectorAll('.diff-btn').forEach(btn => { btn.style.pointerEvents = 'auto'; btn.style.opacity = '1'; });
        document.getElementById('gameStatusMsg').innerHTML = '🎮 Get ready!';
        setTimeout(() => startCountdown(), 500);
    }
    
    function startCountdown() {
        let countdown = 3;
        const countdownInterval = setInterval(() => {
            if (countdown > 0) { document.getElementById('gameStatusMsg').innerHTML = `🎯 ${countdown}...`; countdown--; }
            else {
                clearInterval(countdownInterval);
                document.getElementById('gameStatusMsg').innerHTML = '🎵 GO! Tap circles & drag sliders!';
                gameStarted = true; gameActive = true;
                pendingLifeLoss = false; lifeLossCooldown = false; deathTriggered = false;
                fullReset();
            }
        }, 1000);
    }
    
    function calculateAndUpdateAccuracy() {
        let accuracy = (totalHits + misses === 0) ? 100 : (totalHits / (totalHits + misses)) * 100;
        document.getElementById('accuracyWarning').innerHTML = `📊 ACC: ${accuracy.toFixed(1)}%`;
        document.getElementById('accValue').innerText = accuracy.toFixed(1);
        
        // INSTANT DEATH if accuracy < 60% and game is active
        if (accuracy < 60 && gameActive && gameStarted && !gamePausedForRespawn && !deathTriggered && (totalHits + misses) > 10) {
            deathTriggered = true;
            gameActive = false;
            gameStarted = false;
            gameLocked = true;
            document.getElementById('gameStatusMsg').innerHTML = '💀 INSTANT DEATH - Accuracy fell below 60%! 💀';
            document.getElementById('livesDisplay').innerHTML = `❤️ LIVES: 0`;
            showFloatingJudgement("ACCURACY FAILURE", canvasElem.width/2, canvasElem.height/2, "#ff0000");
            if (animationId) cancelAnimationFrame(animationId);
        }
        return accuracy;
    }
    
    function updateLivesDisplay() {
        document.getElementById('livesDisplay').innerHTML = `❤️ LIVES: ${lives}`;
        if (lives <= 0) {
            document.getElementById('livesDisplay').style.borderColor = '#ff0000';
            document.getElementById('livesDisplay').style.color = '#ff6666';
        }
    }
    
    function generateSliderPath(startX, startY, endX, endY, duration) {
        const points = [];
        const steps = 20;
        for (let i = 0; i <= steps; i++) {
            const t = i / steps;
            const x = startX + (endX - startX) * t;
            const y = startY + (endY - startY) * t + Math.sin(t * Math.PI * 2) * 15;
            points.push({ x, y });
        }
        return points;
    }
    
    function generateBeatmap(diffIndex) {
        const cfg = difficulties[diffIndex];
        const totalNotes = cfg.noteCount;
        const totalSliders = cfg.sliderCount;
        const startOffset = 1500;
        const tEnd = GAME_DURATION_MS - 800;
        
        const timestamps = [];
        const sliders = [];
        
        for(let i = 0; i < totalNotes; i++) {
            let t = startOffset + (i / totalNotes) * (tEnd - startOffset);
            t += (Math.random() - 0.5) * 30;
            timestamps.push(Math.min(tEnd, Math.max(startOffset, t)));
        }
        
        for(let i = 0; i < totalSliders; i++) {
            let t = startOffset + 500 + (i / totalSliders) * (tEnd - startOffset - 500);
            t += (Math.random() - 0.5) * 40;
            sliders.push(Math.min(tEnd - 200, Math.max(startOffset + 300, t)));
        }
        
        timestamps.sort((a,b)=>a-b);
        sliders.sort((a,b)=>a-b);
        
        // Generate random positions for sliders
        const sliderPositions = [];
        for(let i = 0; i < totalSliders; i++) {
            const margin = 80;
            const radius = 30;
            const startX = Math.random() * (canvasElem.width - 2 * margin) + margin;
            const startY = Math.random() * (canvasElem.height - 2 * margin) + margin;
            let endX = startX + (Math.random() - 0.5) * 150;
            let endY = startY + (Math.random() - 0.5) * 100;
            endX = Math.min(canvasElem.width - margin, Math.max(margin, endX));
            endY = Math.min(canvasElem.height - margin, Math.max(margin, endY));
            sliderPositions.push({ startX, startY, endX, endY });
        }
        
        return { circles: timestamps, sliders: sliders, sliderPositions: sliderPositions };
    }
    
    function randomHitPosition(radius) {
        const margin = 70;
        const maxX = canvasElem.width - margin - radius;
        const minX = margin + radius;
        const maxY = canvasElem.height - margin - radius * 1.5;
        const minY = margin + radius * 1.5;
        return { x: Math.floor(Math.random() * (maxX - minX + 1) + minX), y: Math.floor(Math.random() * (maxY - minY + 1) + minY) };
    }
    
    function fullReset() {
        if(animationId) cancelAnimationFrame(animationId);
        circles = []; sliders = []; activeDrag = null;
        score = 0; combo = 0; maxCombo = 0; totalHits = 0; misses = 0;
        updateUIStats(); calculateAndUpdateAccuracy();
        
        const beatmap = generateBeatmap(currentDifficulty);
        const cfg = difficulties[currentDifficulty];
        
        const circleData = beatmap.circles.map((timestamp, idx) => {
            const pos = randomHitPosition(cfg.radius);
            return { timeMs: timestamp, id: `c${idx}`, x: pos.x, y: pos.y, radius: cfg.radius, generated: false, hit: false, approachTime: cfg.approachTime, type: 'circle' };
        });
        
        const sliderObjects = beatmap.sliders.map((timestamp, idx) => {
            const pos = beatmap.sliderPositions[idx];
            const path = generateSliderPath(pos.startX, pos.startY, pos.endX, pos.endY, cfg.approachTime);
            return { 
                timeMs: timestamp, id: `s${idx}`, startX: pos.startX, startY: pos.startY, 
                endX: pos.endX, endY: pos.endY, path: path, radius: cfg.radius - 4,
                generated: false, hit: false, completed: false, approachTime: cfg.approachTime,
                type: 'slider', dragProgress: 0
            };
        });
        
        const allNotes = [...circleData, ...sliderObjects];
        allNotes.sort((a,b) => a.timeMs - b.timeMs);
        
        pendingNotes = allNotes;
        nextCircleIdx = 0;
        gameStartTimestamp = performance.now();
        
        function gameUpdate() {
            if(!gameStarted) { drawCanvas(0); animationId = requestAnimationFrame(gameUpdate); return; }
            if((!gameActive || gamePausedForRespawn)) { drawCanvas(performance.now() - gameStartTimestamp); animationId = requestAnimationFrame(gameUpdate); return; }
            
            const now = performance.now();
            const elapsed = now - gameStartTimestamp;
            
            if(gameActive && !gamePausedForRespawn && gameStarted) {
                while(nextCircleIdx < pendingNotes.length) {
                    const note = pendingNotes[nextCircleIdx];
                    const spawnTime = note.timeMs - note.approachTime;
                    if(elapsed >= spawnTime) {
                        if(!note.generated && !note.hit) {
                            note.generated = true;
                            if(note.type === 'circle') circles.push(note);
                            else sliders.push(note);
                        }
                        nextCircleIdx++;
                    } else break;
                }
                
                const windows = getHitWindows();
                for(let i=0; i<circles.length; i++) {
                    const c = circles[i];
                    if(!c.hit) {
                        const missDelta = elapsed - c.targetTime;
                        if(missDelta > windows.ok + 100) {
                            c.hit = true; combo = 0; misses++;
                            updateUIStats(); calculateAndUpdateAccuracy();
                        }
                    }
                }
                circles = circles.filter(c => !c.hit);
            }
            
            const allProcessed = nextCircleIdx >= pendingNotes.length && circles.length === 0 && sliders.length === 0;
            if(allProcessed && gameActive && elapsed > GAME_DURATION_MS + 500) finishGame();
            drawCanvas(elapsed);
            animationId = requestAnimationFrame(gameUpdate);
        }
        
        animationId = requestAnimationFrame(gameUpdate);
        updateUIStats(); drawCanvas(0);
    }
    
    function finishGame() {
        if(!gameActive) return;
        gameActive = false; gameStarted = false;
        const accuracy = calculateAndUpdateAccuracy();
        document.getElementById('gameStatusMsg').innerHTML = `🏆 CLEAR! Score: ${score} | Acc: ${accuracy.toFixed(1)}% | Max Combo: ${maxCombo} 🎉`;
    }
    
    function handleTap(clientX, clientY) {
        if(!gameActive || gameLocked || gamePausedForRespawn || !gameStarted) return;
        
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        canvasX = Math.min(canvasElem.width, Math.max(0, canvasX));
        canvasY = Math.min(canvasElem.height, Math.max(0, canvasY));
        
        const elapsedGame = performance.now() - gameStartTimestamp;
        
        // Check for circle hits
        let closestCircle = null;
        let minDistance = 80;
        for(let i=0; i<circles.length; i++) {
            const c = circles[i];
            const dx = c.x - canvasX;
            const dy = c.y - canvasY;
            const dist = Math.hypot(dx, dy);
            if(dist <= c.radius * 1.8) {
                if(!closestCircle || dist < minDistance) { closestCircle = c; minDistance = dist; }
            }
        }
        
        if(closestCircle) {
            const timeDiff = Math.abs(elapsedGame - closestCircle.targetTime);
            const windows = getHitWindows();
            let points, judgement, color;
            if (timeDiff <= windows.perfect) { points = BASE_SCORE; judgement = "PERFECT!"; color = "#ffd700"; }
            else if (timeDiff <= windows.good) { points = Math.floor(BASE_SCORE * 0.85); judgement = "GOOD!"; color = "#88ff88"; }
            else if (timeDiff <= windows.ok) { points = Math.floor(BASE_SCORE * 0.6); judgement = "OK"; color = "#88aaff"; }
            else { points = Math.floor(BASE_SCORE * 0.3); judgement = "HIT"; color = "#ffaa88"; }
            
            let finalAdd = points + Math.floor(combo * 3);
            score += finalAdd; combo++;
            if(combo > maxCombo) maxCombo = combo;
            totalHits++; closestCircle.hit = true;
            updateUIStats(); calculateAndUpdateAccuracy();
            
            const screenX = rect.left + (closestCircle.x / scaleX);
            const screenY = rect.top + (closestCircle.y / scaleY);
            showFloatingJudgement(judgement, screenX, screenY, color);
            window.lastHitEffect = { x: closestCircle.x, y: closestCircle.y, timer: 8 };
            return;
        }
        
        // Check for slider start
        for(let i=0; i<sliders.length; i++) {
            const s = sliders[i];
            if(s.hit) continue;
            const timeDiff = Math.abs(elapsedGame - s.timeMs);
            const windows = getHitWindows();
            if(timeDiff <= windows.ok && !activeDrag) {
                const dx = s.startX - canvasX;
                const dy = s.startY - canvasY;
                if(Math.hypot(dx, dy) <= s.radius * 1.8) {
                    activeDrag = s;
                    dragProgress = 0;
                    s.hit = true;
                    showFloatingJudgement("DRAG!", canvasX, canvasY, "#ff88ff");
                    return;
                }
            }
        }
        
        // Miss
        combo = 0; misses++;
        updateUIStats(); calculateAndUpdateAccuracy();
        showFloatingJudgement("MISS", clientX, clientY, "#ff6666");
    }
    
    function handleDrag(clientX, clientY) {
        if(!activeDrag || !gameActive || gamePausedForRespawn) return;
        
        const rect = canvasElem.getBoundingClientRect();
        const scaleX = canvasElem.width / rect.width;
        const scaleY = canvasElem.height / rect.height;
        let canvasX = (clientX - rect.left) * scaleX;
        let canvasY = (clientY - rect.top) * scaleY;
        
        const path = activeDrag.path;
        let bestProgress = 0;
        for(let i=0; i<path.length; i++) {
            const dx = path[i].x - canvasX;
            const dy = path[i].y - canvasY;
            if(Math.hypot(dx, dy) <= activeDrag.radius * 1.5) {
                bestProgress = Math.max(bestProgress, i / (path.length - 1));
            }
        }
        
        if(bestProgress > dragProgress) {
            dragProgress = bestProgress;
            if(dragProgress >= 0.95) {
                const points = SLIDER_BASE_SCORE + Math.floor(combo * 2);
                score += points; combo++;
                if(combo > maxCombo) maxCombo = combo;
                totalHits++;
                updateUIStats(); calculateAndUpdateAccuracy();
                showFloatingJudgement("SLIDER END", canvasX, canvasY, "#ff88ff");
                activeDrag.completed = true;
                activeDrag = null;
                const index = sliders.findIndex(s => s === activeDrag);
                if(index !== -1) sliders.splice(index, 1);
            }
        }
    }
    
    function handleDragEnd() {
        if(activeDrag && !activeDrag.completed) {
            combo = 0; misses++;
            updateUIStats(); calculateAndUpdateAccuracy();
            showFloatingJudgement("DRAG FAIL", activeDrag.startX, activeDrag.startY, "#ff6666");
            const index = sliders.findIndex(s => s === activeDrag);
            if(index !== -1) sliders.splice(index, 1);
        }
        activeDrag = null;
        dragProgress = 0;
    }
    
    function updateUIStats() {
        document.getElementById('scoreValue').innerText = Math.floor(score);
        calculateAndUpdateAccuracy();
        document.getElementById('comboValue').innerText = combo;
    }
    
    function drawCanvas(nowElapsed = 0) {
        if(!ctx) return;
        ctx.clearRect(0, 0, canvasElem.width, canvasElem.height);
        const grad = ctx.createLinearGradient(0,0,canvasElem.width,canvasElem.height);
        grad.addColorStop(0, '#141b2b'); grad.addColorStop(1, '#0e1322');
        ctx.fillStyle = grad; ctx.fillRect(0,0,canvasElem.width,canvasElem.height);
        
        // Draw sliders
        for(let s of sliders) {
            const timeUntilHit = s.timeMs - nowElapsed;
            let alpha = Math.min(1, Math.max(0.3, 1 - (timeUntilHit / s.approachTime) * 0.5));
            
            ctx.beginPath();
            ctx.moveTo(s.path[0].x, s.path[0].y);
            for(let i=1; i<s.path.length; i++) ctx.lineTo(s.path[i].x, s.path[i].y);
            ctx.strokeStyle = `rgba(255, 136, 255, ${alpha})`;
            ctx.lineWidth = 6;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(s.startX, s.startY, s.radius, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 100, 200, ${alpha})`;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(s.endX, s.endY, s.radius-4, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255, 200, 255, ${alpha})`;
            ctx.fill();
        }
        
        // Draw circles
        for(let c of circles) {
            const timeUntilHit = c.targetTime - nowElapsed;
            let approachScale = (timeUntilHit > 0) ? 1.8 - (Math.min(1, Math.max(0, 1 - (timeUntilHit / c.approachTime))) * 0.8) : 1.0;
            const approachRadius = c.radius * approachScale;
            ctx.beginPath(); ctx.arc(c.x, c.y, approachRadius, 0, Math.PI*2);
            ctx.strokeStyle = "#ffddff"; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.arc(c.x, c.y, c.radius-2, 0, Math.PI*2);
            ctx.fillStyle = "#fe7fb5"; ctx.fill();
            ctx.beginPath(); ctx.arc(c.x, c.y, c.radius-8, 0, Math.PI*2);
            ctx.fillStyle = "#ffffff"; ctx.fill();
        }
        
        if(window.lastHitEffect && window.lastHitEffect.timer > 0) {
            ctx.beginPath(); ctx.arc(window.lastHitEffect.x, window.lastHitEffect.y, 50, 0, Math.PI*2);
            ctx.fillStyle = "#ffffffcc"; ctx.fill();
            window.lastHitEffect.timer--;
            if(window.lastHitEffect.timer <=0) window.lastHitEffect = null;
        }
        
        if(combo >= 5 && gameStarted && gameActive) {
            ctx.font = `bold 32px "Montserrat"`;
            ctx.fillStyle = "#ffe6b3"; ctx.shadowBlur = 8; ctx.shadowColor = "#ff66aa";
            ctx.fillText(`${combo}x`, canvasElem.width - 85, 70);
            ctx.shadowBlur = 0;
        }
        
        const elapsed = performance.now() - gameStartTimestamp;
        const prog = Math.min(1, Math.max(0, elapsed / GAME_DURATION_MS));
        ctx.fillStyle = "#ff66aa90"; ctx.fillRect(20, canvasElem.height-25, (canvasElem.width-40)*prog, 10);
        ctx.fillStyle = "#ffffff30"; ctx.fillRect(20, canvasElem.height-25, canvasElem.width-40, 10);
        ctx.fillStyle = "#ffaaee"; ctx.fillRect(20, canvasElem.height-25, (canvasElem.width-40)*prog, 10);
    }
    
    function handleTouchStart(e) { e.preventDefault(); const touch = e.touches[0]; handleTap(touch.clientX, touch.clientY); }
    function handleTouchMove(e) { e.preventDefault(); const touch = e.touches[0]; handleDrag(touch.clientX, touch.clientY); }
    function handleTouchEnd(e) { e.preventDefault(); handleDragEnd(); }
    function handleMouseMove(e) { if(e.buttons !== 1) return; handleDrag(e.clientX, e.clientY); }
    function handleMouseUp() { handleDragEnd(); }
    
    canvasElem.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvasElem.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvasElem.addEventListener('touchend', handleTouchEnd);
    canvasElem.addEventListener('mousedown', (e) => { e.preventDefault(); handleTap(e.clientX, e.clientY); });
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    
    document.getElementById('resetGameBtn').addEventListener('click', () => location.reload());
    document.getElementById('restartSameBtn').addEventListener('click', () => location.reload());
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const newDiff = parseInt(btn.getAttribute('data-diff'));
            if(!isNaN(newDiff) && newDiff !== currentDifficulty) {
                currentDifficulty = newDiff;
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateDifficultyIndicator();
                if(gameStarted && !gameLocked && !quizActive) location.reload();
            }
        });
    });
    
    document.querySelectorAll('.diff-btn').forEach(btn => {
        if(parseInt(btn.getAttribute('data-diff')) === currentDifficulty) btn.classList.add('active');
        btn.style.pointerEvents = 'none'; btn.style.opacity = '0.6';
    });
    updateDifficultyIndicator();
    
    async function init() {
        const questions = await loadQuestions();
        const shuffled = [...questions];
        for(let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        showInitialQuiz(shuffled.slice(0, 3));
    }
    init();
</script>
</body>
